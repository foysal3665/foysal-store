<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foysal Fashion | Compact Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALuGjVy2_L-ufS785MzFPmde0Po2HTxD8",
            authDomain: "foysal-store.firebaseapp.com",
            projectId: "foysal-store",
            storageBucket: "foysal-store.firebasestorage.app",
            messagingSenderId: "509319347526",
            appId: "1:509319347526:web:7958b038fc9b2ad1953947",
            databaseURL: "https://foysal-store-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbRef = ref; window.dbPush = push; window.dbOnValue = onValue; window.dbRemove = remove;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .hero-bg { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600'); background-size: cover; background-position: center; height: 300px; display: flex; align-items: center; justify-content: center; }
        .product-card { border-radius: 18px; transition: 0.3s ease; background: #fff; border: 1px solid #f1f5f9; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900">

    <!-- Navbar -->
    <nav class="glass-nav border-b sticky top-0 z-50 py-3 px-5 flex justify-between items-center">
        <h1 class="text-xl font-extrabold tracking-tighter uppercase">FOYSAL<span class="font-light italic text-slate-500"> FASHION</span></h1>
        <div class="flex items-center gap-3">
            <!-- User Profile Icon -->
            <button onclick="openProfile()" class="w-9 h-9 rounded-full bg-slate-100 overflow-hidden border border-slate-200 flex items-center justify-center text-slate-500 shadow-sm transition">
                <img id="nav-user-img" src="" class="w-full h-full object-cover hidden">
                <i id="nav-user-icon" class="fas fa-user text-sm"></i>
            </button>
            <!-- Admin Icon -->
            <button onclick="openLoginModal()" class="w-9 h-9 rounded-lg bg-slate-900 text-white flex items-center justify-center shadow-sm">
                <i class="fas fa-shield-alt text-xs"></i>
            </button>
        </div>
    </nav>

    <!-- Website View -->
    <div id="user-view">
        <header class="hero-bg text-white text-center px-6">
            <div class="max-w-xl">
                <h1 class="text-3xl md:text-5xl font-bold mb-3">Elite Style</h1>
                <p class="text-slate-300 text-[10px] uppercase tracking-[3px] opacity-90">Global Luxury Experience</p>
            </div>
        </header>

        <main class="container mx-auto px-4 py-10" id="shop">
            <h2 class="text-xl font-bold mb-8 italic border-b-2 border-indigo-600 inline-block">New Arrivals</h2>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-6">
                <!-- Products -->
            </div>
        </main>

        <footer class="bg-white border-t py-12 text-center text-slate-400">
            <p class="text-[10px] font-bold tracking-widest uppercase">© 2024 International Luxury Group</p>
        </footer>
    </div>

    <!-- User Profile Modal -->
    <div id="profile-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden z-[250] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-8 shadow-2xl relative">
            <button onclick="closeProfile()" class="absolute top-5 right-5 text-xl text-slate-300 hover:text-red-500">&times;</button>
            <h2 class="text-xl font-bold mb-6 italic tracking-tight border-b pb-2">My Profile</h2>
            
            <div class="space-y-4">
                <!-- Profile Pic Upload -->
                <div class="flex flex-col items-center mb-4">
                    <label for="u-img-input" class="relative w-20 h-20 rounded-full bg-slate-100 border-2 border-indigo-500 p-1 cursor-pointer group">
                        <img id="u-preview-img" src="" class="w-full h-full rounded-full object-cover hidden">
                        <div id="u-placeholder" class="w-full h-full rounded-full flex items-center justify-center text-slate-400"><i class="fas fa-camera"></i></div>
                        <div class="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center text-white text-[10px] transition">Edit</div>
                    </label>
                    <input type="file" id="u-img-input" accept="image/*" class="hidden" onchange="previewUserImg(event)">
                </div>

                <input type="text" id="u-name" placeholder="Your Name" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                <input type="number" id="u-phone" placeholder="Phone Number" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                <textarea id="u-addr" placeholder="Delivery Address" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm h-20"></textarea>
                
                <button onclick="saveUserProfile()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition">Save Profile</button>
            </div>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="order-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden z-[110] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-md rounded-t-[35px] sm:rounded-[25px] p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <button onclick="closeModal()" class="float-right text-xl text-slate-300">&times;</button>
            <h3 class="font-bold text-lg mb-4 italic uppercase">Checkout</h3>
            <div id="order-info" class="mb-5 p-3 bg-slate-50 rounded-xl flex gap-4 items-center border"></div>
            <div class="space-y-3">
                <input type="text" id="c-name" placeholder="আপনার নাম" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                <input type="text" id="c-addr" placeholder="ঠিকানা" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                <input type="number" id="c-phone" placeholder="মোবাইল নাম্বার" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                <button onclick="confirmWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-extrabold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition">
                    <i class="fab fa-whatsapp"></i> WhatsApp Order
                </button>
            </div>
        </div>
    </div>

    <!-- Admin View & Login Modal (Password: Foysal12@#) -->
    <div id="admin-login-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-xl hidden z-[300] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[35px] p-10 shadow-2xl text-center">
            <h2 class="text-xl font-bold mb-6 italic tracking-tight text-slate-800 uppercase tracking-[3px]">Admin Access</h2>
            <input type="password" id="admin-pass-input" placeholder="••••••••" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl mb-6 outline-none text-center font-bold tracking-[0.5em] focus:ring-1 ring-indigo-500">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold shadow-lg uppercase text-xs tracking-widest">Verify</button>
            <button onclick="document.getElementById('admin-login-modal').classList.add('hidden')" class="mt-4 text-slate-400 text-[10px] font-bold">Dismiss</button>
        </div>
    </div>

    <div id="admin-dashboard-view" class="hidden min-h-screen bg-slate-50">
        <div class="bg-slate-900 text-white p-4 flex justify-between items-center">
            <h2 class="text-sm font-bold italic tracking-widest text-indigo-400 uppercase">Dashboard Pro</h2>
            <button onclick="exitDashboard()" class="bg-red-500 text-white px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase">Exit</button>
        </div>
        <div class="container mx-auto px-4 py-6 max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-white">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest">Add Product</h3>
                <input type="text" id="p-name" placeholder="Product Name" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm">
                <input type="number" id="p-price" placeholder="Price (৳)" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm">
                <input type="file" id="p-image-file" accept="image/*" class="w-full p-3 bg-slate-50 rounded-xl text-[10px] border border-dashed border-indigo-200 mb-3">
                <button id="save-btn" onclick="saveToCloud()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-xs uppercase shadow-lg">Publish</button>
            </div>
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-white">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest">Active Inventory</h3>
                <div id="admin-product-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const MASTER_PASS = "Foysal12@#";
        const WHATSAPP = "8801963792670";
        let storeData = {};
        let selectedP = null;

        // USER PROFILE SYSTEM
        window.openProfile = () => {
            const data = JSON.parse(localStorage.getItem('user_profile')) || {};
            document.getElementById('u-name').value = data.name || "";
            document.getElementById('u-phone').value = data.phone || "";
            document.getElementById('u-addr').value = data.addr || "";
            if(data.img) {
                document.getElementById('u-preview-img').src = data.img;
                document.getElementById('u-preview-img').classList.remove('hidden');
                document.getElementById('u-placeholder').classList.add('hidden');
            }
            document.getElementById('profile-modal').classList.remove('hidden');
        }
        window.closeProfile = () => { document.getElementById('profile-modal').classList.add('hidden'); }
        
        window.previewUserImg = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('u-preview-img').src = reader.result;
                document.getElementById('u-preview-img').classList.remove('hidden');
                document.getElementById('u-placeholder').classList.add('hidden');
            }
            reader.readAsDataURL(file);
        }

        window.saveUserProfile = () => {
            const profile = {
                name: document.getElementById('u-name').value,
                phone: document.getElementById('u-phone').value,
                addr: document.getElementById('u-addr').value,
                img: document.getElementById('u-preview-img').src
            };
            localStorage.setItem('user_profile', JSON.stringify(profile));
            updateProfileUI();
            alert("Profile Updated!");
            closeProfile();
        }

        function updateProfileUI() {
            const data = JSON.parse(localStorage.getItem('user_profile')) || {};
            if(data.img && data.img.startsWith('data:image')) {
                document.getElementById('nav-user-img').src = data.img;
                document.getElementById('nav-user-img').classList.remove('hidden');
                document.getElementById('nav-user-icon').classList.add('hidden');
            }
            // Auto fill order form
            document.getElementById('c-name').value = data.name || "";
            document.getElementById('c-phone').value = data.phone || "";
            document.getElementById('c-addr').value = data.addr || "";
        }

        // LOGIN & DASHBOARD
        window.openLoginModal = () => { document.getElementById('admin-login-modal').classList.remove('hidden'); }
        window.handleLogin = () => {
            if(document.getElementById('admin-pass-input').value === MASTER_PASS) {
                document.getElementById('admin-login-modal').classList.add('hidden');
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-dashboard-view').classList.remove('hidden');
            } else { alert("ACCESS DENIED"); }
        }
        window.exitDashboard = () => {
            document.getElementById('admin-dashboard-view').classList.add('hidden');
            document.getElementById('user-view').classList.remove('hidden');
        }

        // DATABASE SYNC
        setInterval(() => {
            if(!window.dbOnValue) return;
            const ref = window.dbRef(window.db, 'global_products');
            window.dbOnValue(ref, (snap) => {
                const data = snap.val();
                storeData = data || {};
                const grid = document.getElementById('product-grid');
                const adminList = document.getElementById('admin-product-list');
                grid.innerHTML = ""; adminList.innerHTML = "";
                Object.keys(storeData).forEach(key => {
                    const p = storeData[key];
                    grid.innerHTML += `
                        <div onclick="openOrder('${key}')" class="product-card p-2 cursor-pointer text-center">
                            <img src="${p.img}" class="w-full h-32 md:h-48 object-cover rounded-[14px] mb-3">
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest truncate">${p.name}</p>
                            <p class="text-indigo-600 font-extrabold text-sm md:text-base italic">৳${p.price}</p>
                        </div>
                    `;
                    adminList.innerHTML += `
                        <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border">
                            <div class="flex items-center gap-3"><img src="${p.img}" class="w-8 h-8 rounded-lg object-cover"><p class="text-[10px] font-bold uppercase">${p.name}</p></div>
                            <button onclick="removeProduct('${key}')" class="text-red-500 px-2"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                    `;
                });
            }, { onlyOnce: true });
        }, 1500);

        window.saveToCloud = () => {
            const name = document.getElementById('p-name').value, price = document.getElementById('p-price').value, file = document.getElementById('p-image-file').files[0];
            if(!name || !price || !file) return alert("All fields required");
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                window.dbPush(window.dbRef(window.db, 'global_products'), { name, price, img: reader.result });
                alert("Published!");
                location.reload();
            }
        }
        window.removeProduct = (key) => { if(confirm("Delete globally?")) window.dbRemove(window.dbRef(window.db, 'global_products/' + key)); }

        // ORDER
        window.openOrder = (key) => {
            selectedP = storeData[key];
            document.getElementById('order-info').innerHTML = `
                <img src="${selectedP.img}" class="w-12 h-12 rounded-lg object-cover">
                <div class="text-left text-xs"><p class="font-bold">${selectedP.name}</p><p class="text-indigo-600 font-bold">৳${selectedP.price}</p></div>
            `;
            document.getElementById('order-modal').classList.remove('hidden');
        }
        window.closeModal = () => { document.getElementById('order-modal').classList.add('hidden'); }
        window.confirmWhatsApp = () => {
            const n = document.getElementById('c-name').value, a = document.getElementById('c-addr').value, ph = document.getElementById('c-phone').value;
            if(!n || !a || !ph) return alert("Fill profile info first!");
            const msg = `আসসালামু আলাইকুম!\nপণ্য: ${selectedP.name}\nমূল্য: ৳${selectedP.price}\n\n-- কাস্টমার তথ্য --\nনাম: ${n}\nঠিকানা: ${a}\nমোবাইল: ${ph}`;
            window.location.href = `https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}`;
        }

        updateProfileUI();
    </script>
</body>
</html>
