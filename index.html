<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z E N V Y | Premium Luxury Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyALuGjVy2_L-ufS785MzFPmde0Po2HTxD8",
            authDomain: "foysal-store.firebaseapp.com",
            projectId: "foysal-store",
            storageBucket: "foysal-store.firebasestorage.app",
            messagingSenderId: "509319347526",
            appId: "1:509319347526:web:7958b038fc9b2ad1953947",
            databaseURL: "https://foysal-store-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbRef = ref; window.dbPush = push; window.dbSet = set; window.dbOnValue = onValue; window.dbRemove = remove;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background-color: #fcfdfe; overflow-x: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #f1f5f9; }
        
        /* New Luxury Hero Style */
        .hero-gradient { background: #000; position: relative; overflow: hidden; }
        .hero-circle-1 { position: absolute; top: -50px; right: -50px; width: 250px; height: 250px; background: rgba(14, 165, 233, 0.15); border-radius: 50%; blur: 80px; filter: blur(80px); }
        .hero-circle-2 { position: absolute; bottom: -30px; left: -30px; width: 200px; height: 200px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; filter: blur(60px); }
        
        .product-card { background: #fff; border: 1px solid #f1f5f9; border-radius: 14px; transition: 0.3s ease; }
        .product-card:hover { transform: translateY(-3px); border-color: #0ea5e9; }
        .cart-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900">
    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-50 py-2.5 px-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <!-- ZV Logo -->
            <div class="w-10 h-10 rounded-xl bg-black flex items-center justify-center border border-sky-400 shadow-lg shrink-0">
                <svg viewBox="0 0 100 100" class="w-7 h-7">
                    <path d="M25 35H75L25 65H75" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M35 45L50 75L75 30" stroke="#4db8ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </div>
            <h1 class="text-base font-extrabold tracking-[2px] text-slate-900 uppercase">Z E N V Y</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="window.toggleCart(true)" class="relative w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-700">
                <i class="fas fa-shopping-bag text-sm"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-sky-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-sm">0</span>
            </button>
            <button onclick="window.openProfile()" class="w-9 h-9 rounded-full bg-slate-50 border border-slate-100 overflow-hidden flex items-center justify-center text-slate-400">
                <img id="nav-user-img" src="" class="w-full h-full object-cover hidden">
                <i id="nav-user-icon" class="fas fa-user text-xs"></i>
            </button>
        </div>
    </nav>

    <!-- Website View -->
    <div id="user-view">
        <!-- Upgraded Luxury Hero Section -->
        <header class="hero-gradient text-white py-24 px-6 text-center shadow-2xl">
            <div class="hero-circle-1"></div>
            <div class="hero-circle-2"></div>
            
            <div class="relative z-10">
                <span class="inline-block px-4 py-1.5 rounded-full bg-white/10 border border-white/20 text-sky-400 text-[9px] font-bold mb-6 tracking-[0.3em] uppercase backdrop-blur-md">Elite Collection 2024</span>
                <h1 class="text-5xl md:text-8xl font-black italic mb-3 uppercase tracking-tighter leading-none">Elite <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-white">Luxe</span></h1>
                <p class="text-sky-400 text-[11px] font-bold uppercase tracking-[8px] mb-8">Z E N V Y</p>
                <div class="h-[1px] w-20 bg-sky-400 mx-auto mb-8 shadow-[0_0_10px_rgba(77,184,255,0.8)]"></div>
                <p class="text-slate-400 text-[10px] md:text-sm max-w-xs mx-auto opacity-80 leading-relaxed font-light">Elevate your essence with our masterfully crafted premium collection.</p>
            </div>
        </header>

        <div class="container mx-auto px-4 mt-8">
            <div class="max-w-md mx-auto relative text-center">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" id="user-search" oninput="window.searchProduct()" placeholder="Search luxury items..." class="w-full pl-10 pr-4 py-3.5 bg-white border border-slate-100 rounded-2xl outline-none text-xs focus:ring-1 ring-sky-500 transition shadow-sm">
            </div>
        </div>

        <main class="container mx-auto px-3 py-10" id="shop">
            <div class="flex items-center gap-2 mb-6 ml-1">
                <div class="h-4 w-1 bg-sky-500"></div>
                <h2 class="text-[11px] font-bold uppercase tracking-[2px] text-slate-500 italic">Curated Catalog</h2>
            </div>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
        </main>
        
        <footer class="py-16 text-center border-t border-slate-100">
            <h2 class="text-lg font-black tracking-[4px] text-slate-900 mb-2 uppercase">Z E N V Y</h2>
            <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest mb-6 italic">International Luxury Group</p>
            <button onclick="window.openLoginModal()" class="text-[9px] text-slate-300 font-bold uppercase tracking-[2px] hover:text-sky-500 transition border-t pt-4 border-slate-50">Admin Console</button>
        </footer>
    </div>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="fixed inset-0 z-[100] hidden">
        <div onclick="window.toggleCart(false)" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-[320px] bg-white shadow-2xl flex flex-col translate-x-full cart-drawer" id="cart-panel">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50"><h2 class="font-bold uppercase tracking-widest text-[10px]">My Shopping Bag</h2><button onclick="window.toggleCart(false)" class="text-slate-400 text-xl">&times;</button></div>
            <div id="cart-items-list" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar"></div>
            <div class="p-5 border-t bg-white space-y-4 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]"><div class="flex justify-between font-bold text-sm"><span>Subtotal</span><span class="text-sky-600 font-black">৳<span id="cart-total-price">0</span></span></div><button onclick="window.openCheckout()" class="w-full bg-black text-white py-4 rounded-xl font-bold text-[10px] uppercase shadow-lg tracking-widest">Checkout Now</button></div>
        </div>
    </div>

    <!-- Modals (Order, Profile, Login) -->
    <div id="order-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[150] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-md rounded-t-[35px] sm:rounded-[24px] p-7 shadow-2xl overflow-y-auto max-h-[90vh]">
            <button onclick="window.closeModal()" class="float-right text-slate-300 text-2xl">&times;</button>
            <h3 class="font-bold text-xs uppercase tracking-widest text-sky-600 mb-6">Shipping Details</h3>
            <div id="order-summary-box" class="mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-2 text-[10px]"></div>
            <div class="space-y-3">
                <input type="text" id="c-name" placeholder="Full Name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm"><input type="text" id="c-addr" placeholder="Detailed Address" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm"><input type="number" id="c-phone" placeholder="WhatsApp Number" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm">
                <button onclick="window.confirmWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition mt-3 uppercase text-[10px] tracking-widest">Confirm WhatsApp Order</button>
            </div>
        </div>
    </div>

    <div id="admin-login-modal" class="fixed inset-0 bg-slate-900/95 hidden z-[300] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-10 shadow-2xl text-center">
            <h2 class="text-lg font-bold mb-6 uppercase text-slate-800 italic underline decoration-sky-500">Security</h2>
            <input type="password" id="admin-pass-input" placeholder="••••" class="w-full p-4 bg-slate-50 border rounded-xl mb-6 text-center font-bold tracking-[1em] focus:ring-1 ring-sky-500">
            <button onclick="window.handleLogin()" class="w-full bg-black text-white py-3 rounded-xl font-bold uppercase text-xs">Verify</button>
        </div>
    </div>

    <div id="admin-dashboard-view" class="hidden min-h-screen bg-slate-50">
        <div class="glass-nav p-4 flex justify-between items-center shadow-sm"><h2 class="text-[10px] font-bold uppercase text-sky-600">Dashboard</h2><button onclick="window.exitDashboard()" class="bg-red-500 text-white px-4 py-1.5 rounded-lg text-[9px] font-bold uppercase">Exit</button></div>
        <div class="container mx-auto px-3 py-6 max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm h-fit"><h3 id="admin-form-title" class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest border-b pb-1">Add Item</h3><input type="text" id="p-name" placeholder="Name" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm"><input type="number" id="p-price" placeholder="Price" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm font-bold"><input type="file" id="p-image-file" accept="image/*" class="w-full p-3 bg-slate-50 rounded-xl text-[9px] mb-4"><button id="save-btn" onclick="window.saveToCloud()" class="w-full bg-black text-white py-3 rounded-xl font-bold uppercase text-[10px]">Publish</button><button id="cancel-edit-btn" onclick="window.cancelEdit()" class="hidden w-full mt-2 text-slate-400 text-[9px] font-bold underline">Cancel</button></div>
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm"><div id="admin-product-list" class="space-y-2"></div></div>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 bg-black/60 hidden z-[250] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-8 shadow-2xl relative text-center">
            <button onclick="window.closeProfile()" class="absolute top-5 right-5 text-xl text-slate-300 hover:text-red-500">&times;</button>
            <h2 class="text-lg font-bold mb-6 text-sky-600 italic">Profile</h2>
            <div class="space-y-4"><label class="inline-block relative w-20 h-20 rounded-full border-2 border-sky-400 p-1 cursor-pointer overflow-hidden bg-slate-50"><img id="u-preview-img" src="" class="w-full h-full rounded-full object-cover hidden"><div id="u-placeholder" class="w-full h-full flex items-center justify-center text-slate-300"><i class="fas fa-camera text-xl"></i></div><input type="file" accept="image/*" class="hidden" onchange="window.previewUserImg(event)"></label><input type="text" id="u-name" placeholder="Name" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"><input type="number" id="u-phone" placeholder="Mobile" class="w-full p-3 bg-slate-50 border rounded-xl text-sm"><textarea id="u-addr" placeholder="Address" class="w-full p-3 bg-slate-50 border rounded-xl text-sm h-16"></textarea><button onclick="window.saveUserProfile()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold uppercase text-xs">Save</button></div>
        </div>
    </div>

    <!-- Support Floating Button -->
    <a href="https://wa.me/8801963792670" class="fixed bottom-6 left-6 bg-[#25D366] w-12 h-12 rounded-full flex items-center justify-center text-white text-2xl shadow-xl z-50 active:scale-95 transition hover:scale-110">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const MASTER_PASS = "Foysal12@#", WHATSAPP = "8801963792670";
        let storeData = {}, cart = JSON.parse(localStorage.getItem('zenvy_bag_v1')) || [], editingKey = null;

        function fetchAndRender() {
            if(!window.dbOnValue) return;
            const ref = window.dbRef(window.db, 'global_products');
            window.dbOnValue(ref, (snap) => { storeData = snap.val() || {}; renderProducts(storeData); renderAdminList(storeData); }, { onlyOnce: true });
        }
        setInterval(fetchAndRender, 3000);

        function renderProducts(data) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = Object.keys(data).map(key => {
                const p = data[key];
                return `<div class="product-card p-2 text-center flex flex-col justify-between">
                    <img src="${p.img}" class="w-full h-28 md:h-44 object-cover rounded-xl mb-2">
                    <p class="text-[7px] text-slate-400 font-bold uppercase truncate px-1">${p.name}</p>
                    <p class="text-sky-600 font-extrabold text-[10px] mb-2 italic">৳${p.price}</p>
                    <button onclick="window.addToCart('${key}')" class="w-full bg-black text-white text-[8px] py-2.5 rounded-lg font-bold uppercase tracking-widest active:scale-95 transition shadow-sm">Add to bag</button>
                </div>`;
            }).join('');
        }

        window.toggleCart = (s) => { const d = document.getElementById('cart-drawer'), p = document.getElementById('cart-panel'); if(s) { d.classList.remove('hidden'); setTimeout(() => p.classList.remove('translate-x-full'), 10); } else { p.classList.add('translate-x-full'); setTimeout(() => d.classList.add('hidden'), 400); } renderCart(); }
        window.addToCart = (k) => { const p = storeData[k], e = cart.find(i => i.key === k); if(e) e.qty++; else cart.push({ key: k, name: p.name, price: p.price, img: p.img, qty: 1 }); saveCart(); updateCartCount(); window.toggleCart(true); }
        window.updateQty = (i, d) => { cart[i].qty += d; if(cart[i].qty < 1) cart.splice(i, 1); saveCart(); renderCart(); updateCartCount(); }
        
        function renderCart() {
            const l = document.getElementById('cart-items-list'), t = document.getElementById('cart-total-price'); let tt = 0;
            l.innerHTML = cart.map((item, idx) => { tt += item.price * item.qty; return `<div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100 shadow-sm"><img src="${item.img}" class="w-10 h-10 rounded-lg object-cover"><div class="flex-1 min-w-0"><p class="text-[9px] font-bold truncate">${item.name}</p><p class="text-sky-600 font-bold text-[10px]">৳${item.price}</p></div><div class="flex items-center gap-2"><button onclick="window.updateQty(${idx}, -1)" class="w-5 h-5 bg-white border rounded text-xs">-</button><span class="text-[10px] font-bold">${item.qty}</span><button onclick="window.updateQty(${idx}, 1)" class="w-5 h-5 bg-white border rounded text-xs">+</button></div></div>`; }).join('');
            if(cart.length === 0) l.innerHTML = `<p class="text-center text-slate-300 text-[10px] py-10 uppercase tracking-widest italic">Bag is empty</p>`; t.innerText = tt;
        }
        function saveCart() { localStorage.setItem('zenvy_bag_v1', JSON.stringify(cart)); }
        function updateCartCount() { document.getElementById('cart-count').innerText = cart.length; }

        window.openCheckout = () => { if(cart.length === 0) return alert("Bag is empty!"); window.toggleCart(false); const s = document.getElementById('order-summary-box'); let tt = 0; s.innerHTML = cart.map(i => { tt += i.price * i.qty; return `<div class="flex justify-between border-b pb-1"><span>${i.name} (x${i.qty})</span><span>৳${i.price * i.qty}</span></div>`; }).join(''); s.innerHTML += `<div class="flex justify-between font-black text-sky-600 pt-2 uppercase text-xs"><span>Grand Total:</span><span>৳${tt}</span></div>`; document.getElementById('order-modal').classList.remove('hidden'); }
        
        window.confirmWhatsApp = () => {
            const n = document.getElementById('c-name').value.trim(), a = document.getElementById('c-addr').value.trim(), ph = document.getElementById('c-phone').value.trim();
            if(!n || !a || !ph) return alert("Fill form info!");
            let t = cart.map(i => `- ${i.name} (x${i.qty}) = ৳${i.price * i.qty}`).join('\n'), tt = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const msg = `আসসালামু আলাইকুম Z E N V Y!\n\n*Order List:*\n${t}\n\n*Grand Total: ৳${tt}*\n\n-- Customer info --\nName: ${n}\nAddress: ${a}\nMobile: ${ph}`;
            window.location.href = `https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}`;
            cart = []; saveCart(); updateCartCount(); window.closeModal();
        }

        window.searchProduct = () => { const q = document.getElementById('user-search').value.toLowerCase(), f = {}; Object.keys(storeData).forEach(k => { if(storeData[k].name.toLowerCase().includes(q)) f[k] = storeData[k]; }); renderProducts(f); }
        window.renderAdminList = (d) => { const l = document.getElementById('admin-product-list'); l.innerHTML = Object.keys(d).map(k => `<div class="flex justify-between items-center p-3 bg-white rounded-xl border mb-2"><div class="flex items-center gap-3"><img src="${d[k].img}" class="w-8 h-8 rounded object-cover border shadow-sm"><p class="text-[9px] font-bold uppercase truncate w-24 text-slate-700">${d[k].name}</p></div><div class="flex gap-2"><button onclick="window.editProduct('${k}')" class="text-blue-500 px-2"><i class="fas fa-edit"></i></button><button onclick="window.removeProduct('${k}')" class="text-red-500 px-2"><i class="fas fa-trash-alt"></i></button></div></div>`).join(''); }
        window.saveToCloud = () => { const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, f = document.getElementById('p-image-file').files[0], btn = document.getElementById('save-btn'); if(!n || !p) return alert("Fill form!"); btn.innerText = "Syncing..."; const proc = (img) => { const o = { name: n, price: Number(p), img: img || (editingKey ? storeData[editingKey].img : "") }; if(editingKey) window.dbSet(window.dbRef(window.db, 'global_products/' + editingKey), o); else window.dbPush(window.dbRef(window.db, 'global_products'), o); window.cancelEdit(); fetchAndRender(); }; if(f) { const r = new FileReader(); r.onload = () => proc(r.result); r.readAsDataURL(f); } else proc(); }
        window.editProduct = (k) => { editingKey = k; const p = storeData[k]; document.getElementById('p-name').value = p.name; document.getElementById('p-price').value = p.price; document.getElementById('admin-form-title').innerText = "Edit Mode On"; document.getElementById('save-btn').innerText = "Update"; document.getElementById('cancel-edit-btn').classList.remove('hidden'); }
        window.cancelEdit = () => { editingKey = null; document.getElementById('p-name').value = ""; document.getElementById('p-price').value = ""; document.getElementById('admin-form-title').innerText = "Add Item"; document.getElementById('save-btn').innerText = "Publish"; document.getElementById('cancel-edit-btn').classList.add('hidden'); }
        window.removeProduct = (k) => { if(confirm("Delete item globally?")) window.dbRemove(window.dbRef(window.db, 'global_products/' + k)); }
        window.openLoginModal = () => document.getElementById('admin-login-modal').classList.remove('hidden');
        window.handleLogin = () => { if(document.getElementById('admin-pass-input').value === MASTER_PASS) { document.getElementById('admin-login-modal').classList.add('hidden'); document.getElementById('user-view').classList.add('hidden'); document.getElementById('admin-dashboard-view').classList.remove('hidden'); } else alert("DENIED"); }
        window.exitDashboard = () => location.reload();
        window.closeModal = () => document.getElementById('order-modal').classList.add('hidden');
        window.openProfile = () => { const d = JSON.parse(localStorage.getItem('zenvy_user_profile')) || {}; document.getElementById('u-name').value = d.name || ""; document.getElementById('u-phone').value = d.phone || ""; document.getElementById('u-addr').value = d.addr || ""; if(d.img) { document.getElementById('u-preview-img').src = d.img; document.getElementById('u-preview-img').classList.remove('hidden'); document.getElementById('u-placeholder').classList.add('hidden'); } document.getElementById('profile-modal').classList.remove('hidden'); }
        window.closeProfile = () => document.getElementById('profile-modal').classList.add('hidden');
        window.previewUserImg = (e) => { const r = new FileReader(); r.onload = () => { document.getElementById('u-preview-img').src = r.result; document.getElementById('u-preview-img').classList.remove('hidden'); document.getElementById('u-placeholder').classList.add('hidden'); }; r.readAsDataURL(e.target.files[0]); }
        window.saveUserProfile = () => { const o = { name: document.getElementById('u-name').value, phone: document.getElementById('u-phone').value, addr: document.getElementById('u-addr').value, img: document.getElementById('u-preview-img').src }; localStorage.setItem('zenvy_user_profile', JSON.stringify(o)); updateProfileUI(); alert("Identity Saved!"); window.closeProfile(); }
        function updateProfileUI() { const d = JSON.parse(localStorage.getItem('zenvy_user_profile')) || {}; if(d.img && d.img.startsWith('data:image')) { document.getElementById('nav-user-img').src = d.img; document.getElementById('nav-user-img').classList.remove('hidden'); document.getElementById('nav-user-icon').classList.add('hidden'); } document.getElementById('c-name').value = d.name || ""; document.getElementById('c-phone').value = d.phone || ""; document.getElementById('c-addr').value = d.addr || ""; }
        
        updateCartCount(); updateProfileUI(); fetchAndRender();
    </script>
</body>
</html>
