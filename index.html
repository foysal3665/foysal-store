<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z E N V Y | Premium Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALuGjVy2_L-ufS785MzFPmde0Po2HTxD8",
            authDomain: "foysal-store.firebaseapp.com",
            projectId: "foysal-store",
            storageBucket: "foysal-store.firebasestorage.app",
            messagingSenderId: "509319347526",
            appId: "1:509319347526:web:7958b038fc9b2ad1953947",
            databaseURL: "https://foysal-store-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbRef = ref; window.dbPush = push; window.dbOnValue = onValue; window.dbRemove = remove;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Hind+Siliguri:wght@400;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; 
            margin: 0;
            background: #000 url('https://i.ibb.co/3sX8NfS/bg-zenvy-direct.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #fff;
        }

        .glass-nav { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .hero-section { height: 250px; display: flex; align-items: center; justify-content: center; text-align: center; }
        
        .product-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px;
        }
        .product-card:hover { transform: scale(1.05); border-color: #4db8ff; box-shadow: 0 0 20px rgba(77, 184, 255, 0.2); }
        
        .btn-zenvy { background: #4db8ff; color: #000; font-weight: 800; border-radius: 50px; transition: 0.3s; }
        
        /* Modal Custom Style */
        .modal-bg { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(25px); color: white; border: 1px solid rgba(255,255,255,0.1); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .truncate-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-50 py-3 px-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center border border-sky-400 shadow-[0_0_15px_rgba(77,184,255,0.4)]">
                <span class="text-sky-400 font-bold text-xl italic">Z</span>
            </div>
            <h1 class="text-xl font-bold tracking-[4px] text-white">Z E N V Y</h1>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="openProfile()" class="w-10 h-10 rounded-full border border-white/20 overflow-hidden bg-white/5 flex items-center justify-center">
                <img id="nav-user-img" src="" class="w-full h-full object-cover hidden">
                <i id="nav-user-icon" class="fas fa-user text-slate-300"></i>
            </button>
            <button onclick="openLoginModal()" class="w-10 h-10 rounded-xl bg-sky-500 text-black flex items-center justify-center shadow-lg active:scale-90 transition">
                <i class="fas fa-shield-alt"></i>
            </button>
        </div>
    </nav>

    <!-- UI View -->
    <div id="user-view">
        <header class="hero-section">
            <div>
                <h1 class="text-4xl md:text-6xl font-black tracking-tighter text-white uppercase italic">Elite Luxury</h1>
                <p class="text-sky-400 text-[10px] font-bold uppercase tracking-[6px] mt-2">Experience Z E N V Y</p>
            </div>
        </header>

        <main class="container mx-auto px-5 py-8" id="shop">
            <div class="flex items-center gap-3 mb-8">
                <div class="h-5 w-1 bg-sky-400 shadow-[0_0_10px_#4db8ff]"></div>
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-300">New Arrivals</h2>
            </div>
            
            <!-- Compact 2-Column Grid -->
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Products -->
            </div>
        </main>

        <footer class="py-16 text-center opacity-60">
            <h2 class="text-xl font-bold tracking-[8px] text-white mb-4 italic">Z E N V Y</h2>
            <p class="text-[9px] font-bold tracking-widest uppercase">© 2024 International Luxury Group</p>
        </footer>
    </div>

    <!-- User Profile Modal -->
    <div id="profile-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[250] flex items-center justify-center p-4">
        <div class="modal-bg w-full max-w-sm rounded-[35px] p-8 shadow-2xl relative">
            <button onclick="closeProfile()" class="absolute top-5 right-5 text-2xl text-slate-500">&times;</button>
            <h2 class="text-xl font-bold mb-8 italic border-b border-white/10 pb-2 text-sky-400">User Profile</h2>
            <div class="space-y-4">
                <div class="flex flex-col items-center">
                    <label for="u-img-input" class="relative w-24 h-24 rounded-full border-2 border-sky-400 p-1 cursor-pointer overflow-hidden bg-white/5 shadow-2xl">
                        <img id="u-preview-img" src="" class="w-full h-full rounded-full object-cover hidden">
                        <div id="u-placeholder" class="w-full h-full rounded-full flex items-center justify-center text-sky-400"><i class="fas fa-camera text-2xl"></i></div>
                    </label>
                    <input type="file" id="u-img-input" accept="image/*" class="hidden" onchange="previewUserImg(event)">
                </div>
                <input type="text" id="u-name" placeholder="Full Name" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:border-sky-400 transition">
                <input type="number" id="u-phone" placeholder="Phone Number" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:border-sky-400 transition">
                <textarea id="u-addr" placeholder="Address" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:border-sky-400 transition h-24"></textarea>
                <button onclick="saveUserProfile()" class="w-full btn-zenvy py-4 shadow-xl shadow-sky-500/20">SAVE PROFILE</button>
            </div>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="order-modal" class="fixed inset-0 bg-black/90 backdrop-blur-xl hidden z-[110] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="modal-bg w-full max-w-md rounded-t-[45px] sm:rounded-[35px] p-8 shadow-2xl max-h-[95vh] overflow-y-auto">
            <button onclick="closeModal()" class="float-right text-2xl text-slate-500">&times;</button>
            <h3 class="font-bold text-lg mb-6 uppercase tracking-tighter text-sky-400 italic">Checkout</h3>
            <div id="order-info" class="mb-8 p-4 bg-white/5 rounded-3xl flex gap-5 items-center border border-white/10"></div>
            <div class="space-y-4">
                <input type="text" id="c-name" placeholder="আপনার নাম" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none">
                <input type="text" id="c-addr" placeholder="ঠিকানা" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none">
                <input type="number" id="c-phone" placeholder="মোবাইল" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none">
                <button onclick="confirmWhatsApp()" class="w-full bg-[#25D366] text-white py-5 rounded-3xl font-black flex items-center justify-center gap-3 text-lg shadow-xl hover:scale-95 transition">
                    <i class="fab fa-whatsapp text-2xl"></i> CONFIRM ORDER
                </button>
            </div>
        </div>
    </div>

    <!-- Admin Logic (Pass: Foysal12@#) -->
    <div id="admin-login-modal" class="fixed inset-0 bg-black/98 backdrop-blur-2xl hidden z-[300] flex items-center justify-center p-4">
        <div class="modal-bg w-full max-w-sm rounded-[40px] p-10 shadow-2xl text-center">
            <div class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-sky-400 text-sky-400 text-3xl shadow-[0_0_20px_rgba(77,184,255,0.3)]"><i class="fas fa-lock"></i></div>
            <h2 class="text-xl font-bold mb-8 uppercase tracking-[6px] text-white">Security</h2>
            <input type="password" id="admin-pass-input" placeholder="••••" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-8 outline-none text-center font-bold tracking-[1em] text-white focus:ring-1 ring-sky-400 shadow-inner">
            <button onclick="handleLogin()" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-xs tracking-[3px] shadow-2xl active:scale-90 transition">Unlock</button>
        </div>
    </div>

    <div id="admin-dashboard-view" class="hidden min-h-screen bg-black">
        <div class="glass-nav p-4 flex justify-between items-center shadow-xl">
            <h2 class="text-xs font-bold tracking-[4px] uppercase text-sky-400">Inventory Dashboard</h2>
            <button onclick="exitDashboard()" class="bg-red-500 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg">Exit</button>
        </div>
        <div class="container mx-auto px-4 py-8 max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="modal-bg p-8 rounded-[35px] shadow-xl border border-white/5 h-fit">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-6 tracking-widest border-b border-white/5 pb-2">Add New Elite Item</h3>
                <input type="text" id="p-name" placeholder="Name" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 text-white">
                <input type="number" id="p-price" placeholder="Price (৳)" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 text-white font-bold">
                <input type="file" id="p-image-file" accept="image/*" class="w-full p-4 bg-white/5 border-2 border-dashed border-sky-400 rounded-2xl text-[10px] text-slate-400 mb-6">
                <button id="save-btn" onclick="saveToCloud()" class="w-full bg-sky-400 text-black py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Publish To Web</button>
            </div>
            <div class="md:col-span-2 modal-bg p-8 rounded-[35px] shadow-xl border border-white/5 min-h-[500px]">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-6 tracking-widest border-b border-white/5 pb-2">Catalog</h3>
                <div id="admin-product-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Support Floating Button -->
    <a href="https://wa.me/8801963792670" class="fixed bottom-8 left-8 bg-[#25D366] w-14 h-14 rounded-full flex items-center justify-center text-white text-3xl shadow-[0_0_30px_rgba(37,211,102,0.4)] z-50 hover:scale-110 transition active:scale-95">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const MASTER_PASS = "Foysal12@#";
        const WHATSAPP = "8801963792670";
        let storeData = {};
        let selectedP = null;

        // PROFILE SYSTEM
        window.openProfile = () => {
            const data = JSON.parse(localStorage.getItem('zenvy_v3_user')) || {};
            document.getElementById('u-name').value = data.name || "";
            document.getElementById('u-phone').value = data.phone || "";
            document.getElementById('u-addr').value = data.addr || "";
            if(data.img) {
                document.getElementById('u-preview-img').src = data.img;
                document.getElementById('u-preview-img').classList.remove('hidden');
                document.getElementById('u-placeholder').classList.add('hidden');
            }
            document.getElementById('profile-modal').classList.remove('hidden');
        }
        window.closeProfile = () => { document.getElementById('profile-modal').classList.add('hidden'); }
        window.previewUserImg = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('u-preview-img').src = reader.result;
                document.getElementById('u-preview-img').classList.remove('hidden');
                document.getElementById('u-placeholder').classList.add('hidden');
            }
            reader.readAsDataURL(file);
        }
        window.saveUserProfile = () => {
            const profile = {
                name: document.getElementById('u-name').value,
                phone: document.getElementById('u-phone').value,
                addr: document.getElementById('u-addr').value,
                img: document.getElementById('u-preview-img').src
            };
            localStorage.setItem('zenvy_v3_user', JSON.stringify(profile));
            updateProfileUI();
            alert("Profile Updated!"); closeProfile();
        }
        function updateProfileUI() {
            const data = JSON.parse(localStorage.getItem('zenvy_v3_user')) || {};
            if(data.img && data.img.startsWith('data:image')) {
                document.getElementById('nav-user-img').src = data.img;
                document.getElementById('nav-user-img').classList.remove('hidden');
                document.getElementById('nav-user-icon').classList.add('hidden');
            }
            document.getElementById('c-name').value = data.name || "";
            document.getElementById('c-phone').value = data.phone || "";
            document.getElementById('c-addr').value = data.addr || "";
        }

        // LOGIN & SYNC
        window.openLoginModal = () => { document.getElementById('admin-login-modal').classList.remove('hidden'); }
        window.handleLogin = () => {
            if(document.getElementById('admin-pass-input').value === MASTER_PASS) {
                document.getElementById('admin-login-modal').classList.add('hidden');
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-dashboard-view').classList.remove('hidden');
            } else { alert("ACCESS DENIED"); }
        }
        window.exitDashboard = () => { location.reload(); }

        setInterval(() => {
            if(!window.dbOnValue) return;
            const ref = window.dbRef(window.db, 'global_products');
            window.dbOnValue(ref, (snap) => {
                const data = snap.val();
                storeData = data || {};
                const grid = document.getElementById('product-grid');
                const adminList = document.getElementById('admin-product-list');
                grid.innerHTML = ""; adminList.innerHTML = "";
                Object.keys(storeData).forEach(key => {
                    const p = storeData[key];
                    grid.innerHTML += `
                        <div onclick="openOrder('${key}')" class="product-card cursor-pointer flex flex-col">
                            <div class="relative aspect-[1/1.1] rounded-[18px] overflow-hidden mb-3">
                                <img src="${p.img}" class="w-full h-full object-cover">
                            </div>
                            <div class="px-2 pb-1">
                                <p class="text-[8px] text-sky-400 font-bold uppercase tracking-wider mb-1">Elite Item</p>
                                <h3 class="font-bold text-white text-[11px] leading-tight truncate-2 mb-2">${p.name}</h3>
                                <p class="text-sky-400 font-extrabold text-sm italic">৳${p.price}</p>
                                <button class="mt-3 w-full bg-white/10 text-white text-[9px] font-black py-2.5 rounded-xl uppercase tracking-widest border border-white/5">Order Now</button>
                            </div>
                        </div>
                    `;
                    adminList.innerHTML += `
                        <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                            <div class="flex items-center gap-4"><img src="${p.img}" class="w-12 h-12 rounded-xl object-cover border border-white/10"><p class="text-[10px] font-bold text-white uppercase">${p.name}</p></div>
                            <button onclick="removeProduct('${key}')" class="text-red-400 h-10 w-10 bg-white/5 rounded-xl"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                });
            }, { onlyOnce: true });
        }, 1500);

        window.saveToCloud = () => {
            const name = document.getElementById('p-name').value, price = document.getElementById('p-price').value, file = document.getElementById('p-image-file').files[0];
            if(!name || !price || !file) return alert("Fill all fields!");
            const btn = document.getElementById('save-btn'); btn.innerText = "Uploading...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                window.dbPush(window.dbRef(window.db, 'global_products'), { name, price, img: reader.result });
                alert("Published!"); location.reload();
            }
        }
        window.removeProduct = (key) => { if(confirm("Delete item?")) window.dbRemove(window.dbRef(window.db, 'global_products/' + key)); }

        // ORDER
        window.openOrder = (key) => {
            selectedP = storeData[key];
            document.getElementById('order-info').innerHTML = `
                <img src="${selectedP.img}" class="w-16 h-16 rounded-2xl object-cover shadow-lg border border-sky-400">
                <div class="text-left"><p class="font-bold text-white uppercase tracking-wider text-xs mb-1">${selectedP.name}</p><p class="text-sky-400 font-bold text-lg">৳${selectedP.price}</p></div>
            `;
            document.getElementById('order-modal').classList.remove('hidden');
        }
        window.closeModal = () => { document.getElementById('order-modal').classList.add('hidden'); }
        window.confirmWhatsApp = () => {
            const n = document.getElementById('c-name').value, a = document.getElementById('c-addr').value, ph = document.getElementById('c-phone').value;
            if(!n || !a || !ph) return alert("Fill info!");
            const msg = `আসসালামু আলাইকুম Z E N V Y!\nপণ্য: ${selectedP.name}\nমূল্য: ৳${selectedP.price}\n\n-- কাস্টমার --\nনাম: ${n}\nঠিকানা: ${a}\nমোবাইল: ${ph}`;
            window.location.href = `https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}`;
        }
        updateProfileUI();
    </script>
</body>
</html>
