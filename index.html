<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z E N V Y | Premium Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALuGjVy2_L-ufS785MzFPmde0Po2HTxD8",
            authDomain: "foysal-store.firebaseapp.com",
            projectId: "foysal-store",
            storageBucket: "foysal-store.firebasestorage.app",
            messagingSenderId: "509319347526",
            appId: "1:509319347526:web:7958b038fc9b2ad1953947",
            databaseURL: "https://foysal-store-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbRef = ref; window.dbPush = push; window.dbOnValue = onValue; window.dbRemove = remove;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Hind+Siliguri:wght@400;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; 
            margin: 0;
            background-image: url('https://i.ibb.co/Lzf7D49/bg-zenvy.jpg'); /* আপনার দেওয়া ইমেজ */
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: #fff;
        }

        .glass-nav { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .hero-bg { background: rgba(0, 0, 0, 0.4); height: 300px; display: flex; align-items: center; justify-content: center; }
        
        .product-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; 
            transition: 0.4s ease; 
        }
        .product-card:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.1); border-color: #4db8ff; }
        
        .btn-zenvy { background: #4db8ff; color: #000; font-weight: 800; border-radius: 12px; transition: 0.3s; }
        .btn-zenvy:active { scale: 0.95; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Modal Style */
        .modal-content { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-50 py-3 px-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-black rounded-lg flex items-center justify-center border border-sky-400 shadow-[0_0_15px_rgba(77,184,255,0.4)]">
                <span class="text-sky-400 font-bold text-xl italic">Z</span>
            </div>
            <h1 class="text-xl font-extrabold tracking-[3px] text-white">Z E N V Y</h1>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="openProfile()" class="w-9 h-9 rounded-full bg-white/10 border border-white/20 overflow-hidden flex items-center justify-center text-white transition hover:bg-white/20">
                <img id="nav-user-img" src="" class="w-full h-full object-cover hidden">
                <i id="nav-user-icon" class="fas fa-user text-sm"></i>
            </button>
            <button onclick="openLoginModal()" class="w-9 h-9 rounded-lg bg-sky-500 text-black flex items-center justify-center shadow-lg">
                <i class="fas fa-shield-alt text-xs"></i>
            </button>
        </div>
    </nav>

    <!-- Website View -->
    <div id="user-view">
        <header class="hero-bg text-center px-6">
            <div class="max-w-xl">
                <h1 class="text-3xl md:text-5xl font-bold mb-2 tracking-tighter uppercase text-white">Elite Luxury</h1>
                <p class="text-sky-400 text-[10px] font-bold uppercase tracking-[5px]">Experience Z E N V Y</p>
            </div>
        </header>

        <main class="container mx-auto px-4 py-12" id="shop">
            <div class="flex items-center gap-3 mb-10">
                <div class="h-6 w-1 bg-sky-400 shadow-[0_0_10px_#4db8ff]"></div>
                <h2 class="text-xl font-bold uppercase tracking-widest text-white">New Arrivals</h2>
            </div>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-8">
                <!-- Data will load globally -->
            </div>
        </main>

        <footer class="bg-black/80 backdrop-blur-md py-16 text-center border-t border-white/10">
            <h2 class="text-2xl font-bold tracking-[6px] text-white mb-6">Z E N V Y</h2>
            <div class="flex justify-center gap-10 mb-8 text-xl text-slate-500">
                <a href="#" class="hover:text-sky-400 transition"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:text-sky-400 transition"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/8801963792670" class="hover:text-sky-400 transition"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p class="text-[9px] text-slate-600 font-bold tracking-widest uppercase">© 2024 ZENVY INTERNATIONAL GROUP</p>
        </footer>
    </div>

    <!-- User Profile Modal -->
    <div id="profile-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[250] flex items-center justify-center p-4">
        <div class="modal-content w-full max-w-sm rounded-[30px] p-8 shadow-2xl relative">
            <button onclick="closeProfile()" class="absolute top-5 right-5 text-xl text-slate-400 hover:text-red-500">&times;</button>
            <h2 class="text-xl font-bold mb-6 italic border-b border-white/10 pb-2">User Profile</h2>
            <div class="space-y-4 text-slate-300">
                <div class="flex flex-col items-center">
                    <label for="u-img-input" class="relative w-20 h-20 rounded-full border-2 border-sky-400 p-1 cursor-pointer overflow-hidden bg-white/5">
                        <img id="u-preview-img" src="" class="w-full h-full rounded-full object-cover hidden">
                        <div id="u-placeholder" class="w-full h-full rounded-full flex items-center justify-center"><i class="fas fa-camera"></i></div>
                    </label>
                    <input type="file" id="u-img-input" accept="image/*" class="hidden" onchange="previewUserImg(event)">
                </div>
                <input type="text" id="u-name" placeholder="Full Name" class="w-full p-3 bg-white/5 border border-white/10 rounded-xl outline-none text-white">
                <input type="number" id="u-phone" placeholder="Phone Number" class="w-full p-3 bg-white/5 border border-white/10 rounded-xl outline-none text-white">
                <textarea id="u-addr" placeholder="Delivery Address" class="w-full p-3 bg-white/5 border border-white/10 rounded-xl outline-none text-white h-20"></textarea>
                <button onclick="saveUserProfile()" class="w-full btn-zenvy py-3 shadow-[0_0_20px_rgba(77,184,255,0.3)]">Save Profile</button>
            </div>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="order-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[110] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="modal-content w-full max-w-md rounded-t-[40px] sm:rounded-[30px] p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="float-right text-xl text-slate-400">&times;</button>
            <h3 class="font-bold text-lg mb-6 uppercase tracking-tighter text-sky-400">Secure Checkout</h3>
            <div id="order-info" class="mb-6 p-4 bg-white/5 rounded-2xl flex gap-4 items-center border border-white/10"></div>
            <div class="space-y-4">
                <input type="text" id="c-name" placeholder="আপনার নাম" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none">
                <input type="text" id="c-addr" placeholder="ঠিকানা" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none">
                <input type="number" id="c-phone" placeholder="মোবাইল নাম্বার" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-white outline-none">
                <button onclick="confirmWhatsApp()" class="w-full bg-[#25D366] text-white py-5 rounded-2xl font-black flex items-center justify-center gap-3 text-lg shadow-xl hover:bg-green-600 transition">
                    <i class="fab fa-whatsapp text-2xl"></i> CONFIRM VIA WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <!-- Admin Panel (Pass: Foysal12@#) -->
    <div id="admin-login-modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden z-[300] flex items-center justify-center p-4">
        <div class="modal-content w-full max-w-sm rounded-[35px] p-10 shadow-2xl text-center">
            <h2 class="text-xl font-bold mb-8 uppercase tracking-[5px] text-sky-400">Security</h2>
            <input type="password" id="admin-pass-input" placeholder="••••••••" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-8 outline-none text-center font-bold tracking-[0.5em] text-white focus:ring-1 ring-sky-400">
            <button onclick="handleLogin()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-xs tracking-widest shadow-xl">Verify Access</button>
            <button onclick="document.getElementById('admin-login-modal').classList.add('hidden')" class="mt-6 text-slate-500 text-[10px] font-bold">CANCEL</button>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard-view" class="hidden min-h-screen">
        <div class="glass-nav p-4 flex justify-between items-center shadow-xl">
            <h2 class="text-sm font-bold tracking-[3px] uppercase text-sky-400">Inventory Dashboard</h2>
            <button onclick="exitDashboard()" class="bg-red-500 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg">Exit</button>
        </div>
        <div class="container mx-auto px-4 py-8 max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="modal-content p-8 rounded-3xl shadow-xl border border-white/5">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-6 tracking-widest border-b border-white/10 pb-2">Add New Product</h3>
                <input type="text" id="p-name" placeholder="Product Name" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl mb-4 text-white">
                <input type="number" id="p-price" placeholder="Price (৳)" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl mb-4 text-white font-bold">
                <input type="file" id="p-image-file" accept="image/*" class="w-full p-3 bg-white/5 rounded-xl text-[10px] border border-dashed border-sky-400 mb-6">
                <button id="save-btn" onclick="saveToCloud()" class="w-full bg-sky-500 text-black py-4 rounded-xl font-black uppercase text-xs shadow-lg shadow-sky-500/20">Publish To Shop</button>
            </div>
            <div class="md:col-span-2 modal-content p-8 rounded-3xl shadow-xl border border-white/5 min-h-[500px]">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-6 tracking-widest border-b border-white/10 pb-2">Active Inventory</h3>
                <div id="admin-product-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Floating WhatsApp Bubble -->
    <a href="https://wa.me/8801963792670" class="fixed bottom-6 left-6 bg-[#25D366] w-14 h-14 rounded-full flex items-center justify-center text-white text-3xl shadow-[0_0_30px_rgba(37,211,102,0.4)] z-50 hover:scale-110 transition active:scale-95">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const MASTER_PASS = "Foysal12@#";
        const WHATSAPP = "8801963792670";
        let storeData = {};
        let selectedP = null;

        // PROFILE SYSTEM
        window.openProfile = () => {
            const data = JSON.parse(localStorage.getItem('zenvy_user_v2')) || {};
            document.getElementById('u-name').value = data.name || "";
            document.getElementById('u-phone').value = data.phone || "";
            document.getElementById('u-addr').value = data.addr || "";
            if(data.img) {
                document.getElementById('u-preview-img').src = data.img;
                document.getElementById('u-preview-img').classList.remove('hidden');
                document.getElementById('u-placeholder').classList.add('hidden');
            }
            document.getElementById('profile-modal').classList.remove('hidden');
        }
        window.closeProfile = () => { document.getElementById('profile-modal').classList.add('hidden'); }
        window.previewUserImg = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('u-preview-img').src = reader.result;
                document.getElementById('u-preview-img').classList.remove('hidden');
                document.getElementById('u-placeholder').classList.add('hidden');
            }
            reader.readAsDataURL(file);
        }
        window.saveUserProfile = () => {
            const profile = {
                name: document.getElementById('u-name').value,
                phone: document.getElementById('u-phone').value,
                addr: document.getElementById('u-addr').value,
                img: document.getElementById('u-preview-img').src
            };
            localStorage.setItem('zenvy_user_v2', JSON.stringify(profile));
            updateProfileUI();
            alert("Z E N V Y Profile Updated!");
            closeProfile();
        }
        function updateProfileUI() {
            const data = JSON.parse(localStorage.getItem('zenvy_user_v2')) || {};
            if(data.img && data.img.startsWith('data:image')) {
                document.getElementById('nav-user-img').src = data.img;
                document.getElementById('nav-user-img').classList.remove('hidden');
                document.getElementById('nav-user-icon').classList.add('hidden');
            }
            document.getElementById('c-name').value = data.name || "";
            document.getElementById('c-phone').value = data.phone || "";
            document.getElementById('c-addr').value = data.addr || "";
        }

        // LOGIN & SYNC
        window.openLoginModal = () => { document.getElementById('admin-login-modal').classList.remove('hidden'); }
        window.handleLogin = () => {
            if(document.getElementById('admin-pass-input').value === MASTER_PASS) {
                document.getElementById('admin-login-modal').classList.add('hidden');
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-dashboard-view').classList.remove('hidden');
            } else { alert("ACCESS DENIED"); }
        }
        window.exitDashboard = () => { location.reload(); }

        // SYNC LOOP
        setInterval(() => {
            if(!window.dbOnValue) return;
            const ref = window.dbRef(window.db, 'global_products');
            window.dbOnValue(ref, (snap) => {
                const data = snap.val();
                storeData = data || {};
                const grid = document.getElementById('product-grid');
                const adminList = document.getElementById('admin-product-list');
                grid.innerHTML = ""; adminList.innerHTML = "";
                Object.keys(storeData).forEach(key => {
                    const p = storeData[key];
                    grid.innerHTML += `
                        <div onclick="openOrder('${key}')" class="product-card p-3 cursor-pointer text-center group">
                            <div class="relative aspect-[4/5] rounded-[15px] overflow-hidden mb-4">
                                <img src="${p.img}" class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
                            </div>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[2px] truncate mb-1">${p.name}</p>
                            <p class="text-sky-400 font-black text-sm italic">৳${p.price}</p>
                            <div class="mt-4 w-full bg-white text-black text-[9px] font-bold py-3 rounded-xl uppercase opacity-0 group-hover:opacity-100 transition-all">ORDER NOW</div>
                        </div>
                    `;
                    adminList.innerHTML += `
                        <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/10">
                            <div class="flex items-center gap-4"><img src="${p.img}" class="w-12 h-12 rounded-lg object-cover border border-white/10"><p class="text-[10px] font-bold text-white uppercase">${p.name}</p></div>
                            <button onclick="removeProduct('${key}')" class="text-red-400 h-10 w-10 bg-white/5 rounded-xl hover:bg-red-500 hover:text-white transition"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                });
            }, { onlyOnce: true });
        }, 1500);

        window.saveToCloud = () => {
            const name = document.getElementById('p-name').value, price = document.getElementById('p-price').value, file = document.getElementById('p-image-file').files[0];
            if(!name || !price || !file) return alert("All Fields Required");
            const btn = document.getElementById('save-btn'); btn.innerText = "Syncing...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                window.dbPush(window.dbRef(window.db, 'global_products'), { name, price, img: reader.result });
                alert("Z E N V Y Item Live!"); location.reload();
            }
        }
        window.removeProduct = (key) => { if(confirm("Delete item globally?")) window.dbRemove(window.dbRef(window.db, 'global_products/' + key)); }

        // ORDER
        window.openOrder = (key) => {
            selectedP = storeData[key];
            document.getElementById('order-info').innerHTML = `
                <img src="${selectedP.img}" class="w-20 h-20 rounded-xl object-cover shadow-lg border-2 border-sky-400">
                <div class="text-left"><p class="font-black text-white uppercase tracking-widest text-sm mb-1">${selectedP.name}</p><p class="text-sky-400 font-black text-xl italic">৳${selectedP.price}</p></div>
            `;
            document.getElementById('order-modal').classList.remove('hidden');
        }
        window.closeModal = () => { document.getElementById('order-modal').classList.add('hidden'); }
        window.confirmWhatsApp = () => {
            const n = document.getElementById('c-name').value, a = document.getElementById('c-addr').value, ph = document.getElementById('c-phone').value;
            if(!n || !a || !ph) return alert("Complete profile or form!");
            const msg = `আসসালামু আলাইকুম Z E N V Y!\nপণ্য: ${selectedP.name}\nমূল্য: ৳${selectedP.price}\n\n-- কাস্টমার তথ্য --\nনাম: ${n}\nঠিকানা: ${a}\nমোবাইল: ${ph}`;
            window.location.href = `https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}`;
        }

        updateProfileUI();
    </script>
</body>
</html>
