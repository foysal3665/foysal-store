<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z E N V Y | Premium Luxury Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALuGjVy2_L-ufS785MzFPmde0Po2HTxD8",
            authDomain: "foysal-store.firebaseapp.com",
            projectId: "foysal-store",
            storageBucket: "foysal-store.firebasestorage.app",
            messagingSenderId: "509319347526",
            appId: "1:509319347526:web:7958b038fc9b2ad1953947",
            databaseURL: "https://foysal-store-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbRef = ref; window.dbPush = push; window.dbSet = set; window.dbOnValue = onValue; window.dbRemove = remove;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background-color: #fcfdfe; overflow-x: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #f1f5f9; }
        .hero-gradient { background: linear-gradient(135deg, #000 0%, #1e293b 100%); }
        .product-card { background: #fff; border: 1px solid #f1f5f9; border-radius: 14px; transition: 0.3s ease; }
        .product-card:hover { transform: translateY(-3px); border-color: #0ea5e9; }
        .cart-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900">

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-50 py-2.5 px-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 rounded-lg overflow-hidden border border-slate-200">
                <img src="https://i.ibb.co/hZ2vG00/zv-logo.png" class="w-full h-full object-cover">
            </div>
            <h1 class="text-base font-extrabold tracking-[2px] text-slate-900 uppercase">Z E N V Y</h1>
        </div>
        <div class="flex items-center gap-2">
            <!-- Cart Button -->
            <button onclick="window.toggleCart(true)" class="relative w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-700">
                <i class="fas fa-shopping-bag text-sm"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-sky-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-sm">0</span>
            </button>
            <button onclick="window.openProfile()" class="w-9 h-9 rounded-full bg-slate-50 border border-slate-100 overflow-hidden flex items-center justify-center text-slate-400">
                <img id="nav-user-img" src="" class="w-full h-full object-cover hidden">
                <i id="nav-user-icon" class="fas fa-user text-xs"></i>
            </button>
            <button onclick="window.openLoginModal()" class="w-9 h-9 rounded-lg bg-black text-white flex items-center justify-center shadow-sm">
                <i class="fas fa-shield-alt text-[10px]"></i>
            </button>
        </div>
    </nav>

    <!-- Website Content -->
    <div id="user-view">
        <header class="hero-gradient text-white py-16 px-6 text-center">
            <h1 class="text-4xl md:text-6xl font-bold italic mb-2 uppercase tracking-tighter">Elite Luxe</h1>
            <p class="text-sky-400 text-[10px] font-bold uppercase tracking-[4px] mb-4">Z E N V Y</p>
            <p class="text-slate-400 text-[10px] md:text-sm max-w-xs mx-auto opacity-70">Experience luxury at your fingertips. Curated with excellence.</p>
        </header>

        <div class="container mx-auto px-4 mt-8">
            <div class="max-w-md mx-auto relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" id="user-search" oninput="window.searchProduct()" placeholder="Search luxury items..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-100 rounded-2xl outline-none text-xs focus:ring-1 ring-sky-500 transition shadow-sm">
            </div>
        </div>

        <main class="container mx-auto px-3 py-10" id="shop">
            <div class="flex items-center gap-2 mb-6 ml-1">
                <div class="h-4 w-1 bg-sky-500"></div>
                <h2 class="text-[12px] font-bold uppercase tracking-widest text-slate-500">Curated Stock</h2>
            </div>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                <!-- Products load globally -->
            </div>
        </main>
    </div>

    <!-- Shopping Cart Drawer -->
    <div id="cart-drawer" class="fixed inset-0 z-[100] hidden">
        <div onclick="window.toggleCart(false)" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-[320px] bg-white shadow-2xl flex flex-col translate-x-full cart-drawer" id="cart-panel">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                <h2 class="font-bold uppercase tracking-widest text-xs">My Shopping Bag</h2>
                <button onclick="window.toggleCart(false)" class="text-slate-400 text-xl hover:text-black">&times;</button>
            </div>
            <div id="cart-items-list" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar">
                <!-- Items list -->
            </div>
            <div class="p-5 border-t space-y-4 bg-white shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                <div class="flex justify-between font-bold">
                    <span class="text-slate-400 text-xs uppercase">Total Price</span>
                    <span class="text-sky-600">৳<span id="cart-total-price">0</span></span>
                </div>
                <button onclick="window.openCheckout()" class="w-full bg-black text-white py-4 rounded-xl font-bold text-[10px] uppercase tracking-[2px] shadow-lg active:scale-95 transition">Checkout Now</button>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="order-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[150] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-md rounded-t-[35px] sm:rounded-[24px] p-7 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6 border-b pb-3">
                <h3 class="font-bold text-sm uppercase tracking-widest text-sky-600">Shipping Details</h3>
                <button onclick="window.closeModal()" class="text-slate-300 text-2xl hover:text-red-500">&times;</button>
            </div>
            
            <div id="order-summary-box" class="mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-2">
                <!-- Summary of products -->
            </div>

            <div class="space-y-3">
                <input type="text" id="c-name" placeholder="আপনার নাম" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-1 ring-sky-500 text-sm">
                <input type="text" id="c-addr" placeholder="ঠিকানা (গ্রাম, থানা, জেলা)" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-1 ring-sky-500 text-sm">
                <input type="number" id="c-phone" placeholder="মোবাইল নাম্বার" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-1 ring-sky-500 text-sm">
                
                <button onclick="window.confirmWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition mt-3 uppercase text-[11px] tracking-widest">
                    <i class="fab fa-whatsapp text-lg"></i> Confirm Order
                </button>
            </div>
        </div>
    </div>

    <!-- Admin & Login & Profile Modals (Remain Fixed) -->
    <div id="admin-login-modal" class="fixed inset-0 bg-black/90 hidden z-[300] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-10 shadow-2xl text-center">
            <h2 class="text-lg font-bold mb-6 uppercase tracking-[4px]">Security</h2>
            <input type="password" id="admin-pass-input" placeholder="••••" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl mb-6 outline-none text-center font-bold tracking-[1em] focus:ring-1 ring-sky-500">
            <button onclick="window.handleLogin()" class="w-full bg-black text-white py-3 rounded-xl font-bold uppercase text-xs transition">Verify</button>
            <button onclick="document.getElementById('admin-login-modal').classList.add('hidden')" class="mt-4 text-slate-400 text-[10px] font-bold">CANCEL</button>
        </div>
    </div>

    <div id="admin-dashboard-view" class="hidden min-h-screen bg-slate-50">
        <div class="glass-nav p-4 flex justify-between items-center shadow-sm">
            <h2 class="text-[10px] font-bold tracking-[2px] uppercase text-sky-600 italic">Inventory Manager</h2>
            <button onclick="window.exitDashboard()" class="bg-red-500 text-white px-4 py-1.5 rounded-lg text-[9px] font-bold uppercase">Exit</button>
        </div>
        <div class="container mx-auto px-3 py-6 max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm h-fit">
                <h3 id="admin-form-title" class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Add Product</h3>
                <input type="text" id="p-name" placeholder="Name" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm">
                <input type="number" id="p-price" placeholder="Price" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm font-bold">
                <input type="file" id="p-image-file" accept="image/*" class="w-full p-3 bg-slate-50 border rounded-xl text-[9px] mb-4">
                <button id="save-btn" onclick="window.saveToCloud()" class="w-full bg-black text-white py-3 rounded-xl font-bold uppercase text-[10px]">Publish</button>
                <button id="cancel-edit-btn" onclick="window.cancelEdit()" class="hidden w-full mt-2 text-slate-400 text-[9px] font-bold uppercase underline">Cancel Edit</button>
            </div>
            <div class="md:col-span-2 bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <div id="admin-product-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden z-[250] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-8 shadow-2xl relative">
            <button onclick="window.closeProfile()" class="absolute top-5 right-5 text-xl text-slate-300 hover:text-red-500">&times;</button>
            <h2 class="text-lg font-bold mb-6 italic border-b pb-2 text-sky-600 text-center">My Profile</h2>
            <div class="space-y-4 text-center">
                <label for="u-img-input" class="inline-block relative w-20 h-20 rounded-full border-2 border-sky-400 p-1 cursor-pointer overflow-hidden bg-slate-50">
                    <img id="u-preview-img" src="" class="w-full h-full rounded-full object-cover hidden">
                    <div id="u-placeholder" class="w-full h-full flex items-center justify-center text-slate-300"><i class="fas fa-camera"></i></div>
                    <input type="file" id="u-img-input" accept="image/*" class="hidden" onchange="window.previewUserImg(event)">
                </label>
                <input type="text" id="u-name" placeholder="Your Name" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                <input type="number" id="u-phone" placeholder="Mobile" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                <textarea id="u-addr" placeholder="Address" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm h-16"></textarea>
                <button onclick="window.saveUserProfile()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold uppercase text-xs tracking-widest shadow-lg">Save Profile</button>
            </div>
        </div>
    </div>

    <!-- Support Floating Button -->
    <a href="https://wa.me/8801963792670" class="fixed bottom-6 left-6 bg-[#25D366] w-12 h-12 rounded-full flex items-center justify-center text-white text-2xl shadow-xl z-50 active:scale-95 transition">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const MASTER_PASS = "Foysal12@#";
        const WHATSAPP = "8801963792670";
        let storeData = {};
        let cart = JSON.parse(localStorage.getItem('zenvy_bag_v1')) || [];
        let editingKey = null;

        // SYNC & FETCH
        function fetchAndRender() {
            if(!window.dbOnValue) return;
            const ref = window.dbRef(window.db, 'global_products');
            window.dbOnValue(ref, (snap) => {
                storeData = snap.val() || {};
                renderProducts(storeData);
                renderAdminList(storeData);
            }, { onlyOnce: true });
        }
        setInterval(fetchAndRender, 2500);

        function renderProducts(data) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = Object.keys(data).map(key => {
                const p = data[key];
                return `
                    <div class="product-card p-2 text-center flex flex-col justify-between">
                        <img src="${p.img}" class="w-full h-28 md:h-44 object-cover rounded-xl mb-2">
                        <p class="text-[7px] text-slate-400 font-bold uppercase truncate px-1">${p.name}</p>
                        <p class="text-sky-600 font-extrabold text-[11px] mb-2 italic">৳${p.price}</p>
                        <button onclick="window.addToCart('${key}')" class="w-full bg-black text-white text-[8px] py-2.5 rounded-lg font-bold uppercase tracking-widest active:scale-95 transition shadow-sm">Add to bag</button>
                    </div>
                `;
            }).join('');
        }

        // CART FUNCTIONALITY
        window.toggleCart = (show) => {
            const drawer = document.getElementById('cart-drawer');
            const panel = document.getElementById('cart-panel');
            if(show) {
                drawer.classList.remove('hidden');
                setTimeout(() => panel.classList.remove('translate-x-full'), 10);
            } else {
                panel.classList.add('translate-x-full');
                setTimeout(() => drawer.classList.add('hidden'), 400);
            }
            renderCart();
        }

        window.addToCart = (key) => {
            const p = storeData[key];
            const existing = cart.find(item => item.key === key);
            if(existing) existing.qty++;
            else cart.push({ key, name: p.name, price: p.price, img: p.img, qty: 1 });
            saveCart();
            updateCartCount();
            window.toggleCart(true);
        }

        window.updateQty = (idx, delta) => {
            cart[idx].qty += delta;
            if(cart[idx].qty < 1) cart.splice(idx, 1);
            saveCart();
            renderCart();
            updateCartCount();
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const totalEl = document.getElementById('cart-total-price');
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                total += item.price * item.qty;
                return `
                    <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100 shadow-sm">
                        <img src="${item.img}" class="w-10 h-10 rounded-lg object-cover">
                        <div class="flex-1 min-w-0">
                            <p class="text-[9px] font-bold truncate">${item.name}</p>
                            <p class="text-sky-600 font-bold text-[10px]">৳${item.price}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="window.updateQty(${idx}, -1)" class="w-5 h-5 bg-white border rounded text-xs">-</button>
                            <span class="text-[10px] font-bold">${item.qty}</span>
                            <button onclick="window.updateQty(${idx}, 1)" class="w-5 h-5 bg-white border rounded text-xs">+</button>
                        </div>
                    </div>
                `;
            }).join('');
            if(cart.length === 0) list.innerHTML = `<p class="text-center text-slate-300 text-[10px] py-10 uppercase tracking-widest italic">Bag is empty</p>`;
            totalEl.innerText = total;
        }

        function saveCart() { localStorage.setItem('zenvy_bag_v1', JSON.stringify(cart)); }
        function updateCartCount() { document.getElementById('cart-count').innerText = cart.length; }

        // CHECKOUT FIX
        window.openCheckout = () => {
            if(cart.length === 0) return alert("Your bag is empty!");
            window.toggleCart(false);
            const summaryBox = document.getElementById('order-summary-box');
            let total = 0;
            summaryBox.innerHTML = cart.map(i => {
                total += i.price * i.qty;
                return `<div class="flex justify-between text-[10px] font-bold border-b pb-1 border-slate-200">
                    <span>${i.name} (x${i.qty})</span>
                    <span>৳${i.price * i.qty}</span>
                </div>`;
            }).join('');
            summaryBox.innerHTML += `<div class="flex justify-between text-xs font-black text-sky-600 pt-2 uppercase"><span>Grand Total:</span> <span>৳${total}</span></div>`;
            document.getElementById('order-modal').classList.remove('hidden');
        }

        window.confirmWhatsApp = () => {
            const n = document.getElementById('c-name').value.trim();
            const a = document.getElementById('c-addr').value.trim();
            const ph = document.getElementById('c-phone').value.trim();
            
            if(!n || !a || !ph) return alert("দয়া করে নাম, ঠিকানা ও মোবাইল নাম্বার দিন!");

            let itemsText = cart.map(i => `- ${i.name} (Qty: ${i.qty}) = ৳${i.price * i.qty}`).join('\n');
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            
            const msg = `আসসালামু আলাইকুম Z E N V Y!\n\n*অর্ডার লিস্ট:*\n${itemsText}\n\n*মোট দাম: ৳${total}*\n\n-- কাস্টমার তথ্য --\nনাম: ${n}\nঠিকানা: ${a}\nমোবাইল: ${ph}`;
            
            window.location.href = `https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}`;
            
            // Clear cart after redirect
            cart = []; saveCart(); updateCartCount(); window.closeModal();
        }

        // OTHER FUNCTIONS
        window.closeModal = () => document.getElementById('order-modal').classList.add('hidden');
        window.searchProduct = () => { const q = document.getElementById('user-search').value.toLowerCase(); const filtered = {}; Object.keys(storeData).forEach(key => { if(storeData[key].name.toLowerCase().includes(q)) filtered[key] = storeData[key]; }); renderProducts(filtered); }
        window.renderAdminList = (data) => { const list = document.getElementById('admin-product-list'); list.innerHTML = Object.keys(data).map(key => { const p = data[key]; return `<div class="flex justify-between items-center p-3 bg-white rounded-xl border mb-2"><div class="flex items-center gap-3"><img src="${p.img}" class="w-8 h-8 rounded object-cover border"><p class="text-[9px] font-bold uppercase truncate w-24 text-slate-700">${p.name}</p></div><div class="flex gap-2"><button onclick="window.editProduct('${key}')" class="text-blue-500 px-2 hover:scale-110"><i class="fas fa-edit"></i></button><button onclick="window.removeProduct('${key}')" class="text-red-500 px-2 hover:scale-110"><i class="fas fa-trash-alt"></i></button></div></div>`; }).join(''); }
        window.saveToCloud = () => { const name = document.getElementById('p-name').value, price = document.getElementById('p-price').value, file = document.getElementById('p-image-file').files[0], btn = document.getElementById('save-btn'); if(!name || !price) return alert("Fill Name/Price"); btn.innerText = "Processing..."; const processSave = (imgData) => { const product = { name, price, img: imgData || (editingKey ? storeData[editingKey].img : "") }; if(editingKey) window.dbSet(window.dbRef(window.db, 'global_products/' + editingKey), product); else window.dbPush(window.dbRef(window.db, 'global_products'), product); window.cancelEdit(); fetchAndRender(); }; if(file) { const reader = new FileReader(); reader.onload = () => processSave(reader.result); reader.readAsDataURL(file); } else processSave(); }
        window.editProduct = (key) => { editingKey = key; const p = storeData[key]; document.getElementById('p-name').value = p.name; document.getElementById('p-price').value = p.price; document.getElementById('admin-form-title').innerText = "Edit Mode On"; document.getElementById('save-btn').innerText = "Update Product"; document.getElementById('cancel-edit-btn').classList.remove('hidden'); }
        window.cancelEdit = () => { editingKey = null; document.getElementById('p-name').value = ""; document.getElementById('p-price').value = ""; document.getElementById('admin-form-title').innerText = "Add New Product"; document.getElementById('save-btn').innerText = "Publish globally"; document.getElementById('cancel-edit-btn').classList.add('hidden'); }
        window.removeProduct = (key) => { if(confirm("Delete item globally?")) window.dbRemove(window.dbRef(window.db, 'global_products/' + key)); }
        window.openLoginModal = () => { document.getElementById('admin-login-modal').classList.remove('hidden'); }
        window.handleLogin = () => { if(document.getElementById('admin-pass-input').value === MASTER_PASS) { document.getElementById('admin-login-modal').classList.add('hidden'); document.getElementById('user-view').classList.add('hidden'); document.getElementById('admin-dashboard-view').classList.remove('hidden'); } else alert("WRONG PASSWORD"); }
        window.exitDashboard = () => location.reload();
        window.openProfile = () => { const data = JSON.parse(localStorage.getItem('zenvy_user_profile')) || {}; document.getElementById('u-name').value = data.name || ""; document.getElementById('u-phone').value = data.phone || ""; document.getElementById('u-addr').value = data.addr || ""; if(data.img) { document.getElementById('u-preview-img').src = data.img; document.getElementById('u-preview-img').classList.remove('hidden'); document.getElementById('u-placeholder').classList.add('hidden'); } document.getElementById('profile-modal').classList.remove('hidden'); }
        window.closeProfile = () => document.getElementById('profile-modal').classList.add('hidden');
        window.previewUserImg = (e) => { const reader = new FileReader(); reader.onload = () => { document.getElementById('u-preview-img').src = reader.result; document.getElementById('u-preview-img').classList.remove('hidden'); document.getElementById('u-placeholder').classList.add('hidden'); }; reader.readAsDataURL(e.target.files[0]); }
        window.saveUserProfile = () => { const profile = { name: document.getElementById('u-name').value, phone: document.getElementById('u-phone').value, addr: document.getElementById('u-addr').value, img: document.getElementById('u-preview-img').src }; localStorage.setItem('zenvy_user_profile', JSON.stringify(profile)); updateProfileUI(); alert("Profile Updated!"); window.closeProfile(); }
        function updateProfileUI() { const data = JSON.parse(localStorage.getItem('zenvy_user_profile')) || {}; if(data.img && data.img.startsWith('data:image')) { document.getElementById('nav-user-img').src = data.img; document.getElementById('nav-user-img').classList.remove('hidden'); document.getElementById('nav-user-icon').classList.add('hidden'); } document.getElementById('c-name').value = data.name || ""; document.getElementById('c-phone').value = data.phone || ""; document.getElementById('c-addr').value = data.addr || ""; }
        
        updateCartCount();
        updateProfileUI();
        fetchAndRender();
    </script>
</body>
</html>
