<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foysal Fashion | Premium Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-[#F9FAFB] text-slate-900">

    <!-- Premium Navbar -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" onclick="showShop(); return false;" class="text-2xl font-extrabold tracking-tight text-slate-900">
                FOYSAL<span class="font-light italic"> FASHION</span>
            </a>

            <div class="flex items-center space-x-5">
                <button onclick="toggleCart()" class="relative group">
                    <i class="fa-solid fa-bag-shopping text-2xl group-hover:text-black transition"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Shop View -->
    <div id="shop-view">
        <!-- Hero Section -->
        <section class="relative h-[300px] flex items-center overflow-hidden bg-black text-white px-6">
            <div class="container mx-auto relative z-10">
                <h1 class="text-3xl md:text-5xl font-bold mb-3">আপনার স্টাইলকে করুন আরও <span class="italic text-indigo-400">স্মার্ট</span></h1>
                <p class="text-sm md:text-base text-slate-300 max-w-lg mb-6">সেরা কোয়ালিটির গ্যাজেট এবং ফ্যাশন আইটেম এখন আপনার হাতের মুঠোয়।</p>
                <a href="#shop" class="bg-white text-black px-8 py-3 rounded-xl font-bold">Shop Now</a>
            </div>
        </section>

        <!-- Product Grid -->
        <div class="container mx-auto px-6 py-12" id="shop">
            <h2 class="text-2xl font-bold mb-8 text-center uppercase tracking-widest italic">প্রিমিয়াম কালেকশন</h2>
            <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8"></div>
        </div>
    </div>

    <!-- Admin Dashboard (Hidden initially) -->
    <div id="admin-view" class="hidden min-h-screen bg-slate-50 p-6">
        <div class="max-w-4xl mx-auto bg-white rounded-3xl p-8 shadow-sm">
            <div class="flex justify-between mb-8">
                <h2 class="text-2xl font-bold">অ্যাডমিন ড্যাশবোর্ড</h2>
                <button onclick="logoutAdmin()" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-sm font-bold">Logout</button>
            </div>
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Add Product Form -->
                <div class="bg-slate-50 p-6 rounded-2xl">
                    <h3 class="font-bold mb-4">নতুন প্রোডাক্ট যোগ করুন</h3>
                    <form onsubmit="submitProduct(event)" class="space-y-4">
                        <input id="p-name" type="text" placeholder="পণ্যের নাম" required class="w-full p-4 rounded-xl border-none outline-none">
                        <input id="p-price" type="number" placeholder="দাম (৳)" required class="w-full p-4 rounded-xl border-none outline-none">
                        <input id="p-image-file" type="file" accept="image/*" onchange="handleImageFile(event)" class="w-full text-xs">
                        <input id="p-image" type="hidden">
                        <button type="submit" class="w-full bg-black text-white py-4 rounded-xl font-bold">Add Product</button>
                    </form>
                </div>
                <!-- Admin Stats -->
                <div id="admin-product-list" class="space-y-4 overflow-y-auto max-h-[400px]">
                    <!-- Admin list via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Direct Order Modal -->
    <div id="order-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-6">
            <div id="order-product-preview" class="mb-4"></div>
            <form onsubmit="submitDirectOrder(event)" class="space-y-3">
                <input id="order-name" type="text" required placeholder="আপনার নাম" class="w-full p-4 bg-slate-50 rounded-xl">
                <input id="order-phone" type="tel" required placeholder="মোবাইল নাম্বার" class="w-full p-4 bg-slate-50 rounded-xl">
                <textarea id="order-address" required placeholder="ঠিকানা" class="w-full p-4 bg-slate-50 rounded-xl"></textarea>
                <button type="submit" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp অর্ডার দিন
                </button>
            </form>
            <button onclick="closeOrderModal()" class="w-full mt-4 text-slate-400">বন্ধ করুন</button>
        </div>
    </div>

    <!-- Floating Admin Button -->
    <button onclick="openAdmin()" class="fixed bottom-6 right-6 z-[90] w-14 h-14 rounded-full bg-black text-white shadow-2xl flex items-center justify-center">
        <i class="fa-solid fa-gear text-xl"></i>
    </button>

    <script>
        const ADMIN_PASSWORD = "Foysal12@#";
        const STORAGE_KEY = "foysal_fashion_products";
        const WHATSAPP_NUM = "8801963792670";

        let products = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
            { id: 1, name: "Premium Headphone", price: 3500, category: "Electronics", image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600" },
            { id: 2, name: "Smart Watch V2", price: 5200, category: "Electronics", image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600" }
        ];

        let selectedOrderProduct = null;

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div onclick="openOrder(${p.id})" class="bg-white rounded-3xl overflow-hidden border border-slate-100 hover:shadow-xl transition cursor-pointer">
                    <img src="${p.image}" class="w-full h-40 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-sm line-clamp-2 h-10">${p.name}</h3>
                        <p class="font-extrabold text-indigo-600 mt-2">৳${p.price}</p>
                        <button class="w-full mt-3 bg-black text-white py-2 rounded-xl text-xs font-bold italic">Order Now</button>
                    </div>
                </div>
            `).join('');
            
            const adminList = document.getElementById('admin-product-list');
            if(adminList) {
                adminList.innerHTML = products.map((p, idx) => `
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border">
                        <div class="flex items-center gap-3">
                            <img src="${p.image}" class="w-10 h-10 rounded-lg object-cover">
                            <span class="text-xs font-bold">${p.name}</span>
                        </div>
                        <button onclick="deleteProduct(${idx})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `).join('');
            }
        }

        function openOrder(id) {
            selectedOrderProduct = products.find(p => p.id === id);
            document.getElementById('order-product-preview').innerHTML = `
                <div class="flex gap-4 items-center">
                    <img src="${selectedOrderProduct.image}" class="w-16 h-16 rounded-xl object-cover">
                    <div>
                        <h4 class="font-bold">${selectedOrderProduct.name}</h4>
                        <p class="text-indigo-600 font-bold">৳${selectedOrderProduct.price}</p>
                    </div>
                </div>
            `;
            document.getElementById('order-modal').classList.remove('hidden');
        }

        function closeOrderModal() { document.getElementById('order-modal').classList.add('hidden'); }

        function submitDirectOrder(e) {
            e.preventDefault();
            const n = document.getElementById('order-name').value, ph = document.getElementById('order-phone').value, addr = document.getElementById('order-address').value;
            const msg = `আসসালামু আলাইকুম!\nআমি একটি পণ্য অর্ডার করতে চাই:\n\n*পণ্য:* ${selectedOrderProduct.name}\n*মূল্য:* ৳${selectedOrderProduct.price}\n\n*কাস্টমার ডিটেইলস:*\nনাম: ${n}\nমোবাইল: ${ph}\nঠিকানা: ${addr}`;
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function handleImageFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => document.getElementById('p-image').value = ev.target.result;
            reader.readAsDataURL(file);
        }

        function submitProduct(e) {
            e.preventDefault();
            const name = document.getElementById('p-name').value, price = document.getElementById('p-price').value, img = document.getElementById('p-image').value;
            products.push({ id: Date.now(), name, price, image: img });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
            renderProducts();
            e.target.reset();
        }

        function deleteProduct(idx) {
            if(confirm("ডিলিট করতে চান?")) {
                products.splice(idx, 1);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
                renderProducts();
            }
        }

        function openAdmin() {
            const pw = prompt("অ্যাডমিন পাসওয়ার্ড দিন:");
            if (pw === ADMIN_PASSWORD) {
                document.getElementById('shop-view').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                renderProducts();
            } else { alert("ভুল পাসওয়ার্ড!"); }
        }

        function logoutAdmin() {
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('shop-view').classList.remove('hidden');
        }

        renderProducts();
    </script>
</body>
</html>
