<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z E N V Y | Premium Luxury Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALuGjVy2_L-ufS785MzFPmde0Po2HTxD8",
            authDomain: "foysal-store.firebaseapp.com",
            projectId: "foysal-store",
            storageBucket: "foysal-store.firebasestorage.app",
            messagingSenderId: "509319347526",
            appId: "1:509319347526:web:7958b038fc9b2ad1953947",
            databaseURL: "https://foysal-store-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbRef = ref; window.dbPush = push; window.dbOnValue = onValue; window.dbRemove = remove;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Hind+Siliguri:wght@400;700&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background-color: #fcfdfe; }
        
        /* Premium Shadows and Glass */
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid #f1f5f9; }
        .hero-gradient { background: linear-gradient(135deg, #000000 0%, #1e293b 100%); }
        
        .product-card { 
            background: #ffffff; 
            border: 1px solid #f1f5f9;
            border-radius: 24px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: #0ea5e9; }
        
        .btn-zenvy { background: #0ea5e9; color: #fff; border-radius: 12px; transition: 0.2s; }
        .btn-zenvy:active { scale: 0.95; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900">

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-50 py-3 px-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-black rounded-lg flex items-center justify-center border border-sky-400">
                <span class="text-sky-400 font-bold text-lg italic">Z</span>
            </div>
            <h1 class="text-lg font-extrabold tracking-[3px] text-slate-900 uppercase">Z E N V Y</h1>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="openProfile()" class="w-9 h-9 rounded-full bg-slate-50 border border-slate-100 overflow-hidden flex items-center justify-center text-slate-400">
                <img id="nav-user-img" src="" class="w-full h-full object-cover hidden">
                <i id="nav-user-icon" class="fas fa-user text-xs"></i>
            </button>
            <button onclick="openLoginModal()" class="w-9 h-9 rounded-lg bg-slate-900 text-white flex items-center justify-center shadow-md">
                <i class="fas fa-shield-alt text-[10px]"></i>
            </button>
        </div>
    </nav>

    <!-- User View -->
    <div id="user-view">
        <!-- Hero Section -->
        <header class="hero-gradient text-white py-12 px-6 text-center">
            <div class="max-w-xl mx-auto">
                <span class="inline-block px-3 py-1 rounded-full bg-sky-500/20 text-sky-400 text-[9px] font-bold mb-4 tracking-widest uppercase border border-sky-500/30">Luxe Collection</span>
                <h1 class="text-4xl md:text-6xl font-bold mb-4 leading-tight italic">Elite Style</h1>
                <p class="text-slate-400 text-xs md:text-sm tracking-[2px] uppercase opacity-80">Experience Z E N V Y</p>
            </div>
        </header>

        <!-- Product Grid -->
        <main class="container mx-auto px-4 py-12" id="shop">
            <div class="flex items-center gap-3 mb-10">
                <div class="h-6 w-1.5 bg-sky-500 rounded-full"></div>
                <h2 class="text-lg font-bold uppercase tracking-widest">New Arrivals</h2>
            </div>
            
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-8">
                <!-- Products -->
            </div>
        </main>

        <footer class="bg-white border-t border-slate-100 py-16 text-center">
            <h2 class="text-xl font-bold tracking-[6px] text-slate-900 mb-6 uppercase">Z E N V Y</h2>
            <div class="flex justify-center gap-8 mb-8 text-xl text-slate-300">
                <a href="#" class="hover:text-sky-500 transition"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:text-sky-500 transition"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/8801963792670" class="hover:text-sky-500 transition"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p class="text-[9px] text-slate-400 font-bold tracking-widest uppercase italic">© 2024 ZENVY GROUP</p>
        </footer>
    </div>

    <!-- Modals -->
    <!-- Order Modal -->
    <div id="order-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden z-[110] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[30px] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <button onclick="closeModal()" class="float-right text-xl text-slate-300">&times;</button>
            <h3 class="font-bold text-lg mb-6 uppercase tracking-tighter text-sky-600 italic">Checkout</h3>
            <div id="order-info" class="mb-6 p-4 bg-slate-50 rounded-2xl flex gap-4 items-center border border-slate-100 shadow-inner"></div>
            <div class="space-y-4">
                <input type="text" id="c-name" placeholder="আপনার নাম" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 ring-sky-500">
                <input type="text" id="c-addr" placeholder="ঠিকানা" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 ring-sky-500">
                <input type="number" id="c-phone" placeholder="মোবাইল নাম্বার" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 ring-sky-500">
                <button onclick="confirmWhatsApp()" class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition mt-4">
                    <i class="fab fa-whatsapp"></i> WhatsApp Order
                </button>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-login-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl hidden z-[300] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl text-center">
            <h2 class="text-xl font-bold mb-8 uppercase tracking-[4px] text-slate-800">Admin Login</h2>
            <input type="password" id="admin-pass-input" placeholder="••••••••" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl mb-6 outline-none text-center font-bold tracking-[0.5em] focus:ring-1 ring-sky-500">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold uppercase text-xs tracking-widest transition">Verify</button>
            <button onclick="document.getElementById('admin-login-modal').classList.add('hidden')" class="mt-4 text-slate-400 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <div id="admin-dashboard-view" class="hidden min-h-screen bg-[#f8fafc]">
        <div class="glass-nav p-4 flex justify-between items-center shadow-md">
            <h2 class="text-xs font-bold tracking-[2px] uppercase text-sky-600 italic">Inventory Controller</h2>
            <button onclick="exitDashboard()" class="bg-red-500 text-white px-5 py-1.5 rounded-lg text-[9px] font-bold uppercase">Exit</button>
        </div>
        <div class="container mx-auto px-4 py-8 max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-[25px] shadow-sm border border-slate-100">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest border-b pb-2">Add New Item</h3>
                <input type="text" id="p-name" placeholder="Name" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm">
                <input type="number" id="p-price" placeholder="Price (৳)" class="w-full p-3 bg-slate-50 border rounded-xl mb-3 text-sm font-bold">
                <input type="file" id="p-image-file" accept="image/*" class="w-full p-3 bg-slate-50 border-2 border-dashed border-sky-100 rounded-xl text-[9px] mb-4">
                <button id="save-btn" onclick="saveToCloud()" class="w-full bg-sky-500 text-white py-3 rounded-xl font-bold uppercase text-[10px] shadow-lg">Publish Globally</button>
            </div>
            <div class="md:col-span-2 bg-white p-6 rounded-[25px] shadow-sm border border-slate-100 min-h-[500px]">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest border-b pb-2">Catalog</h3>
                <div id="admin-product-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- User Profile Modal -->
    <div id="profile-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden z-[250] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[35px] p-8 shadow-2xl relative">
            <button onclick="closeProfile()" class="absolute top-6 right-6 text-2xl text-slate-300">&times;</button>
            <h2 class="text-xl font-bold mb-6 italic border-b pb-2 text-sky-600">My Identity</h2>
            <div class="space-y-4">
                <div class="flex flex-col items-center">
                    <label for="u-img-input" class="relative w-20 h-20 rounded-full border-2 border-sky-400 p-1 cursor-pointer overflow-hidden bg-slate-50 shadow-inner">
                        <img id="u-preview-img" src="" class="w-full h-full rounded-full object-cover hidden">
                        <div id="u-placeholder" class="w-full h-full flex items-center justify-center text-slate-300"><i class="fas fa-camera"></i></div>
                    </label>
                    <input type="file" id="u-img-input" accept="image/*" class="hidden" onchange="previewUserImg(event)">
                </div>
                <input type="text" id="u-name" placeholder="আপনার নাম" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                <input type="number" id="u-phone" placeholder="মোবাইল" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm">
                <textarea id="u-addr" placeholder="পুরো ঠিকানা" class="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm h-20"></textarea>
                <button onclick="saveUserProfile()" class="w-full btn-zenvy py-3 font-bold shadow-lg shadow-sky-200">Save Data</button>
            </div>
        </div>
    </div>

    <!-- Floating Support -->
    <a href="https://wa.me/8801963792670" class="fixed bottom-8 left-8 bg-[#25D366] w-14 h-14 rounded-full flex items-center justify-center text-white text-3xl shadow-xl z-50 hover:scale-110 active:scale-95 transition">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const MASTER_PASS = "Foysal12@#";
        const WHATSAPP = "8801963792670";
        let storeData = {};
        let selectedP = null;

        // USER PROFILE
        window.openProfile = () => {
            const data = JSON.parse(localStorage.getItem('zenvy_user_v5')) || {};
            document.getElementById('u-name').value = data.name || "";
            document.getElementById('u-phone').value = data.phone || "";
            document.getElementById('u-addr').value = data.addr || "";
            if(data.img) {
                document.getElementById('u-preview-img').src = data.img;
                document.getElementById('u-preview-img').classList.remove('hidden');
                document.getElementById('u-placeholder').classList.add('hidden');
            }
            document.getElementById('profile-modal').classList.remove('hidden');
        }
        window.closeProfile = () => { document.getElementById('profile-modal').classList.add('hidden'); }
        window.previewUserImg = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('u-preview-img').src = reader.result;
                document.getElementById('u-preview-img').classList.remove('hidden');
                document.getElementById('u-placeholder').classList.add('hidden');
            }
            reader.readAsDataURL(e.target.files[0]);
        }
        window.saveUserProfile = () => {
            const profile = { name: document.getElementById('u-name').value, phone: document.getElementById('u-phone').value, addr: document.getElementById('u-addr').value, img: document.getElementById('u-preview-img').src };
            localStorage.setItem('zenvy_user_v5', JSON.stringify(profile));
            updateProfileUI(); alert("Profile Saved!"); closeProfile();
        }
        function updateProfileUI() {
            const data = JSON.parse(localStorage.getItem('zenvy_user_v5')) || {};
            if(data.img && data.img.startsWith('data:image')) {
                document.getElementById('nav-user-img').src = data.img;
                document.getElementById('nav-user-img').classList.remove('hidden');
                document.getElementById('nav-user-icon').classList.add('hidden');
            }
            document.getElementById('c-name').value = data.name || "";
            document.getElementById('c-phone').value = data.phone || "";
            document.getElementById('c-addr').value = data.addr || "";
        }

        // LOGIN & SYNC
        window.openLoginModal = () => { document.getElementById('admin-login-modal').classList.remove('hidden'); }
        window.handleLogin = () => {
            if(document.getElementById('admin-pass-input').value === MASTER_PASS) {
                document.getElementById('admin-login-modal').classList.add('hidden');
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-dashboard-view').classList.remove('hidden');
            } else { alert("ACCESS DENIED"); }
        }
        window.exitDashboard = () => { location.reload(); }

        setInterval(() => {
            if(!window.dbOnValue) return;
            const ref = window.dbRef(window.db, 'global_products');
            window.dbOnValue(ref, (snap) => {
                const data = snap.val();
                storeData = data || {};
                const grid = document.getElementById('product-grid');
                const adminList = document.getElementById('admin-product-list');
                grid.innerHTML = ""; adminList.innerHTML = "";
                Object.keys(storeData).forEach(key => {
                    const p = storeData[key];
                    grid.innerHTML += `
                        <div onclick="openOrder('${key}')" class="product-card p-3 cursor-pointer text-center group">
                            <div class="relative aspect-[1/1.1] rounded-[18px] overflow-hidden mb-4">
                                <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                            </div>
                            <h3 class="font-bold text-slate-800 text-[11px] md:text-sm tracking-tight truncate uppercase leading-tight mb-1">${p.name}</h3>
                            <p class="text-sky-600 font-extrabold text-sm md:text-base italic">৳${p.price}</p>
                            <div class="mt-3 w-full bg-slate-900 text-white text-[9px] font-bold py-2 rounded-xl uppercase opacity-0 group-hover:opacity-100 transition-all">Order Now</div>
                        </div>
                    `;
                    adminList.innerHTML += `
                        <div class="flex justify-between items-center p-3 bg-white rounded-2xl border border-slate-100 shadow-sm">
                            <div class="flex items-center gap-3"><img src="${p.img}" class="w-10 h-10 rounded-lg object-cover border"><p class="text-[10px] font-bold text-slate-600 uppercase">${p.name}</p></div>
                            <button onclick="removeProduct('${key}')" class="text-red-500 h-9 w-9 bg-slate-50 rounded-xl hover:bg-red-500 hover:text-white transition shadow-inner"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
            }, { onlyOnce: true });
        }, 1500);

        window.saveToCloud = () => {
            const name = document.getElementById('p-name').value, price = document.getElementById('p-price').value, file = document.getElementById('p-image-file').files[0];
            if(!name || !price || !file) return alert("Fill all info!");
            const btn = document.getElementById('save-btn'); btn.innerText = "Processing...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                window.dbPush(window.dbRef(window.db, 'global_products'), { name, price, img: reader.result });
                alert("Published Successfully!"); location.reload();
            }
        }
        window.removeProduct = (key) => { if(confirm("Delete item?")) window.dbRemove(window.dbRef(window.db, 'global_products/' + key)); }

        // ORDER
        window.openOrder = (key) => {
            selectedP = storeData[key];
            document.getElementById('order-info').innerHTML = `
                <img src="${selectedP.img}" class="w-20 h-20 rounded-2xl object-cover shadow-md border-2 border-sky-400">
                <div class="text-left"><p class="font-bold text-slate-800 uppercase tracking-widest text-xs mb-1">${selectedP.name}</p><p class="text-sky-600 font-bold text-xl italic tracking-tighter">৳${selectedP.price}</p></div>
            `;
            document.getElementById('order-modal').classList.remove('hidden');
        }
        window.closeModal = () => { document.getElementById('order-modal').classList.add('hidden'); }
        window.confirmWhatsApp = () => {
            const n = document.getElementById('c-name').value, a = document.getElementById('c-addr').value, ph = document.getElementById('c-phone').value;
            if(!n || !a || !ph) return alert("Fill info!");
            const msg = `আসসালামু আলাইকুম Z E N V Y!\nপণ্য: ${selectedP.name}\nমূল্য: ৳${selectedP.price}\n\n-- কাস্টমার --\nনাম: ${n}\nঠিকানা: ${a}\nমোবাইল: ${ph}`;
            window.location.href = `https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}`;
        }
        updateProfileUI();
    </script>
</body>
</html>
