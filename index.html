<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE STORE | Premium Global Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ১. আপনার ফায়ারবেস কনফিগ (স্ক্রিনশট অনুযায়ী ১০০% নির্ভুল)
        const firebaseConfig = {
            apiKey: "AIzaSyALuGjVy2_L-ufS785MzFPmde0Po2HTxD8",
            authDomain: "foysal-store.firebaseapp.com",
            projectId: "foysal-store",
            storageBucket: "foysal-store.firebasestorage.app",
            messagingSenderId: "509319347526",
            appId: "1:509319347526:web:7958b038fc9b2ad1953947",
            databaseURL: "https://foysal-store-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // গ্লোবাল এক্সেস দেওয়া হচ্ছে
        window.db = db; window.dbRef = ref; window.dbPush = push; window.dbOnValue = onValue; window.dbRemove = remove;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(14px); }
        .product-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2rem; }
        .product-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .hero-bg { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .btn-premium { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    </style>
</head>
<body class="text-slate-900">

    <!-- Premium Navbar -->
    <nav class="glass border-b sticky top-0 z-[100] py-4 px-6 shadow-sm flex justify-between items-center">
        <h1 class="text-2xl font-extrabold tracking-tighter uppercase text-slate-900"><span class="text-indigo-600">LUXE</span>STORE</h1>
        <button onclick="openAdmin()" class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 shadow-inner hover:text-indigo-600 transition">
            <i class="fa-solid fa-sliders text-xl"></i>
        </button>
    </nav>

    <!-- Ultra Premium Hero Section -->
    <header class="hero-bg text-white py-24 px-8 text-center relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <div class="absolute top-0 right-0 w-[400px] h-[400px] bg-indigo-500/20 rounded-full blur-[100px] -mr-32 -mt-32"></div>
        
        <div class="relative z-10 max-w-2xl mx-auto">
            <span class="inline-block px-4 py-1 rounded-full bg-white/10 text-indigo-400 text-[10px] font-bold mb-6 tracking-[0.2em] uppercase border border-white/10">Limited Edition 2024</span>
            <h1 class="text-5xl md:text-7xl font-extrabold mb-8 leading-tight">আপনার স্টাইল, <br><span class="text-indigo-400 italic font-light">আমাদের পণ্য</span></h1>
            <p class="text-slate-400 mb-10 text-sm md:text-lg leading-relaxed max-w-lg mx-auto">এখন আপনি অ্যাডমিন থেকে যা অ্যাড করবেন তা সারা পৃথিবীর সবাই রিয়েল-টাইমে দেখতে পাবে।</p>
            <div class="flex justify-center gap-4">
                <a href="#shop" class="btn-premium px-10 py-4 rounded-[2rem] font-bold shadow-2xl shadow-indigo-500/40 inline-block transform hover:-translate-y-1 transition">Shop Now</a>
            </div>
        </div>
    </header>

    <!-- Shop Content -->
    <main class="container mx-auto px-4 py-20" id="shop">
        <div class="flex items-end justify-between mb-16 border-b pb-8 border-slate-100">
            <div>
                <p class="text-indigo-600 font-bold text-xs uppercase tracking-widest mb-2">Curated List</p>
                <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight italic">Trending Items</h2>
            </div>
        </div>

        <!-- 2-Column Luxury Grid -->
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-12">
            <!-- Data will load here -->
        </div>
    </main>

    <!-- Full Screen Order Modal -->
    <div id="order-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl hidden z-[110] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-lg rounded-t-[3rem] sm:rounded-[2.5rem] p-10 shadow-2xl overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic tracking-tighter">CHECKOUT</h2>
                <button onclick="closeModal()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-100 text-slate-500 text-2xl hover:bg-red-50 hover:text-red-500 transition">&times;</button>
            </div>
            
            <div id="selected-info" class="mb-10 p-6 bg-slate-50 rounded-[2rem] flex gap-6 items-center border border-slate-100 shadow-inner"></div>

            <div class="space-y-6 text-left">
                <input type="text" id="c-name" placeholder="আপনার পুরো নাম" class="w-full p-5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition shadow-inner font-bold">
                <input type="text" id="c-addr" placeholder="ঠিকানা (গ্রাম, থানা, জেলা)" class="w-full p-5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition shadow-inner font-bold">
                <input type="number" id="c-phone" placeholder="মোবাইল নাম্বার" class="w-full p-5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition shadow-inner font-bold tracking-widest">
                
                <button onclick="confirmOrder()" class="w-full btn-premium text-white py-6 rounded-[2rem] font-black flex items-center justify-center gap-4 text-xl shadow-2xl shadow-indigo-500/40 active:scale-95 transition-all mt-6 uppercase">
                    <i class="fab fa-whatsapp text-3xl"></i> Confirm Order
                </button>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-2xl hidden z-[120] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div id="admin-login-ui">
                <h2 class="text-3xl font-black mb-10 text-center italic tracking-tighter">SECURITY Access</h2>
                <input type="password" id="admin-pass" placeholder="পাসওয়ার্ড দিন" class="w-full p-6 bg-slate-50 border-none rounded-2xl mb-6 outline-none text-center font-black tracking-widest focus:ring-2 ring-indigo-500 shadow-inner transition">
                <button onclick="checkAdminPass()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-lg">Verify</button>
                <button onclick="closeAdmin()" class="w-full mt-6 text-slate-400 font-bold">Cancel</button>
            </div>

            <div id="admin-content-ui" class="hidden space-y-8 text-left">
                <div class="flex justify-between items-center border-b pb-5">
                    <h2 class="text-2xl font-bold italic text-indigo-600">Inventory Pro</h2>
                    <button onclick="closeAdmin()" class="text-slate-400 text-2xl">&times;</button>
                </div>
                
                <div class="bg-slate-50 p-8 rounded-[2.5rem] space-y-5 shadow-inner">
                    <input type="text" id="p-name" placeholder="পণ্যের নাম" class="w-full p-5 bg-white border-none rounded-2xl outline-none shadow-sm font-bold">
                    <input type="number" id="p-price" placeholder="দাম (৳)" class="w-full p-5 bg-white border-none rounded-2xl outline-none shadow-sm font-black">
                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">গ্যালারি থেকে ছবি নিন</label>
                        <input type="file" id="p-image-file" accept="image/*" class="w-full p-5 bg-white border-2 border-dashed border-indigo-100 rounded-2xl text-xs">
                    </div>
                    <button onclick="saveGlobalProduct()" id="save-btn" class="w-full btn-premium text-white py-5 rounded-2xl font-bold shadow-xl">Publish Globally</button>
                </div>

                <div id="admin-product-list" class="space-y-4 pt-4 border-t"></div>
            </div>
        </div>
    </div>

    <script type="module">
        const WHATSAPP = "8801963792670";
        const ADMIN_PASS = "Foysal12@#";
        let productsData = {};
        let selectedProduct = null;

        // ২. ডাটাবেস থেকে রিয়েলটাইম লোড
        const productsRef = window.ref(window.db, 'global_products');
        window.dbOnValue(productsRef, (snapshot) => {
            const data = snapshot.val();
            productsData = data || {};
            const grid = document.getElementById('product-grid');
            const adminList = document.getElementById('admin-product-list');
            
            grid.innerHTML = "";
            adminList.innerHTML = "";

            Object.keys(productsData).forEach(key => {
                const p = productsData[key];
                // শপ গ্রিড রেন্ডার (সেই দামী ডিজাইন)
                grid.innerHTML += `
                    <div onclick="openOrderModal('${key}')" class="product-card bg-white overflow-hidden border border-slate-50 shadow-sm group cursor-pointer text-center">
                        <div class="relative overflow-hidden aspect-[4/5]">
                            <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                            <div class="absolute inset-0 bg-slate-900/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        </div>
                        <div class="p-6">
                            <h3 class="font-bold text-slate-800 text-xs md:text-sm tracking-tight mb-3 uppercase">${p.name}</h3>
                            <span class="text-sm md:text-xl font-black text-indigo-600 tracking-tighter italic block mb-3">৳${p.price}</span>
                            <div class="w-full py-3 rounded-xl bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest group-hover:bg-indigo-600 transition-colors">BUY NOW</div>
                        </div>
                    </div>
                `;
                // অ্যাডমিন লিস্ট রেন্ডার
                adminList.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white rounded-[1.5rem] border border-slate-100 shadow-sm">
                        <div class="flex items-center gap-4">
                            <img src="${p.img}" class="w-12 h-12 rounded-xl object-cover border-2 border-white shadow-md">
                            <span class="text-xs font-bold">${p.name}</span>
                        </div>
                        <button onclick="window.deleteGlobalProduct('${key}')" class="h-10 w-10 text-red-500 bg-red-50 rounded-xl hover:bg-red-500 hover:text-white transition"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
            });
        });

        // ৩. ডাটাবেসে সেভ (সবার ফোনে দেখাবে)
        window.saveGlobalProduct = function() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const file = document.getElementById('p-image-file').files[0];
            const btn = document.getElementById('save-btn');

            if (!name || !price || !file) { alert("সব তথ্য দিন!"); return; }

            btn.innerText = "Syncing with Cloud...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function () {
                const newProduct = { name, price, img: reader.result };
                window.dbPush(window.dbRef(window.db, 'global_products'), newProduct);
                btn.innerText = "Publish Globally";
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-image-file').value = '';
                alert("পণ্যটি সফলভাবে সবার ফোনে অ্যাড হয়েছে!");
            };
        };

        // ৪. গ্লোবাল ডিলিট
        window.deleteGlobalProduct = function(key) {
            if(confirm("এটি ডিলিট করলে সবার ফোন থেকে ডিলিট হবে। নিশ্চিত?")) {
                window.dbRemove(window.dbRef(window.db, 'global_products/' + key));
            }
        };

        window.openOrderModal = function(key) {
            selectedProduct = productsData[key];
            document.getElementById('selected-info').innerHTML = `
                <img src="${selectedProduct.img}" class="w-20 h-20 rounded-2xl object-cover shadow-lg border-4 border-white">
                <div class="text-left"><h4 class="font-black text-slate-800 text-sm leading-tight mb-1">${selectedProduct.name}</h4><p class="text-indigo-600 font-extrabold text-xl italic">৳${selectedProduct.price}</p></div>
            `;
            document.getElementById('order-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.confirmOrder = function() {
            const n = document.getElementById('c-name').value, a = document.getElementById('c-addr').value, ph = document.getElementById('c-phone').value;
            if(!n || !a || !ph) { alert("সব তথ্য দিন!"); return; }
            let msg = `নতুন অর্ডার এসেছে!\n\nপণ্য: ${selectedProduct.name}\nমূল্য: ৳${selectedProduct.price}\n\n-- কাস্টমার তথ্য --\nনাম: ${n}\nঠিকানা: ${a}\nমোবাইল: ${ph}`;
            window.location.href = `https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}`;
        };
    </script>

    <script>
        function openAdmin() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
        function closeModal() { document.getElementById('order-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function checkAdminPass() {
            if(document.getElementById('admin-pass').value === "Foysal12@#") {
                document.getElementById('admin-login-ui').classList.add('hidden');
                document.getElementById('admin-content-ui').classList.remove('hidden');
            } else { alert("ACCESS DENIED!"); }
        }
    </script>
</body>
</html>
