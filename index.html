<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeStore | Premium Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .font-logo { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(14px); }
        .product-card:hover img { transform: scale(1.1); transition: 0.5s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900 leading-relaxed">

    <!-- Premium Navbar -->
    <nav class="glass border-b border-slate-100 sticky top-0 z-[60] py-4 px-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-tighter font-logo text-indigo-600 uppercase">LUXE<span class="text-slate-900">STORE</span></h1>
            <div class="flex items-center gap-4">
                <button onclick="openAdmin()" class="bg-white/50 h-11 w-11 rounded-2xl flex items-center justify-center text-slate-500 hover:text-indigo-600 transition border border-slate-100 shadow-sm">
                    <i class="fas fa-gear text-lg"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Professional Hero Section (Dark Theme) -->
    <header class="bg-[#0f172a] py-20 px-6 text-center relative overflow-hidden">
        <!-- Background Pattern -->
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <div class="absolute -top-24 -left-24 w-64 h-64 bg-indigo-600/20 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-indigo-400/20 rounded-full blur-3xl"></div>
        
        <div class="relative z-10 max-w-3xl mx-auto">
            <span class="inline-block px-4 py-1.5 rounded-full bg-indigo-500/10 text-indigo-400 text-[10px] font-bold mb-6 tracking-[0.2em] uppercase border border-indigo-500/20">Elite Collection 2024</span>
            <h1 class="text-4xl md:text-7xl font-bold text-white mb-8 leading-[1.1] tracking-tight">আপনার স্টাইলকে করুন আরও <span class="text-indigo-500 italic">প্রিমিয়াম</span></h1>
            <p class="text-slate-400 mb-10 text-sm md:text-xl max-w-xl mx-auto leading-relaxed">সেরা কোয়ালিটির গ্যাজেট এবং ফ্যাশন আইটেম এখন সরাসরি গ্যালারি থেকে যোগ করার সুবিধাসহ আপনার হাতের মুঠোয়।</p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="#shop" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-2xl font-bold transition-all shadow-2xl shadow-indigo-500/40 inline-block transform hover:-translate-y-1">Shop Collection</a>
                <a href="https://wa.me/8801963792670" class="bg-white/5 hover:bg-white/10 text-white border border-white/20 px-10 py-4 rounded-2xl font-bold backdrop-blur-md transition-all inline-block">Contact Us</a>
            </div>
        </div>
    </header>

    <!-- Main Shop Section -->
    <main class="container mx-auto px-4 py-16" id="shop">
        <div class="flex items-center justify-between mb-12">
            <div>
                <h2 class="text-3xl font-bold tracking-tight text-slate-900 italic">Trending Now</h2>
                <div class="h-1.5 w-16 bg-indigo-600 rounded-full mt-2"></div>
            </div>
        </div>

        <!-- 2-Column Responsive Grid -->
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-10">
            <!-- Products via JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-100 py-16 text-center">
        <div class="container mx-auto px-6">
            <h2 class="text-3xl font-extrabold font-logo mb-6 text-slate-900 tracking-tighter italic">LUXE STORE</h2>
            <div class="flex justify-center gap-8 mb-10 text-2xl text-slate-400">
                <a href="#" class="hover:text-indigo-600 transition duration-300"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:text-indigo-600 transition duration-300"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/8801963792670" class="hover:text-indigo-600 transition duration-300"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p class="text-slate-400 text-sm font-medium tracking-wide">© 2024 LUXESTORE. Crafted for Excellence.</p>
        </div>
    </footer>

    <!-- Order Modal (Lux Design) -->
    <div id="order-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-lg hidden z-[100] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-md rounded-t-[45px] sm:rounded-[35px] p-8 shadow-2xl overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold italic tracking-tight text-slate-800">অর্ডার কনফার্ম করুন</h2>
                <button onclick="closeModal()" class="w-11 h-11 flex items-center justify-center rounded-2xl bg-slate-100 text-slate-500 text-2xl hover:bg-red-50 hover:text-red-500 transition">&times;</button>
            </div>
            
            <div id="selected-info" class="mb-8 p-5 bg-indigo-50/50 rounded-[28px] flex gap-5 items-center border border-indigo-100/50"></div>

            <div class="space-y-5 text-left">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">পুরো নাম</label>
                    <input type="text" id="cust-name" placeholder="আপনার নাম লিখুন" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition shadow-inner">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">ঠিকানা</label>
                    <input type="text" id="cust-addr" placeholder="গ্রাম, থানা, জেলা" class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition shadow-inner">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">মোবাইল নাম্বার</label
