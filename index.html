<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENVY | Ultimate Store</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyALuGjVy2_L-ufS785MzFPmde0Po2HTxD8",
authDomain: "foysal-store.firebaseapp.com",
projectId: "foysal-store",
storageBucket: "foysal-store.firebasestorage.app",
messagingSenderId: "509319347526",
appId: "1:509319347526:web:7958b038fc9b2ad1953947",
databaseURL: "https://foysal-store-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
window.db = getDatabase(app);
window.dbRef = ref;
window.dbPush = push;
window.dbOnValue = onValue;
window.dbRemove = remove;
</script>

<style>
body{
margin:0;
background:#000;
background-image:url('./images/bg.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
font-family:sans-serif;
}
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
z-index:-1;
}
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:10px;
transition:0.3s;
}
.card:hover{
transform:translateY(-8px);
border:1px solid #38bdf8;
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- NAV -->
<nav class="flex justify-between items-center p-5">
<h1 class="text-2xl font-bold text-sky-400">ZENVY</h1>
<button onclick="openLogin()" class="bg-sky-400 text-black px-4 py-2 rounded-full">Admin</button>
</nav>

<!-- PRODUCTS -->
<div id="products" class="p-5 grid grid-cols-2 md:grid-cols-4 gap-5"></div>

<!-- LOGIN -->
<div id="loginBox" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
<div class="bg-white text-black p-5 rounded-xl">
<h2 class="mb-3 font-bold">Admin Login</h2>
<input type="password" id="pass" placeholder="Password" class="border p-2">
<button onclick="checkPass()" class="bg-black text-white px-4 py-2 mt-2">Login</button>
</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden p-5">
<h2 class="text-xl mb-3">Add Product</h2>
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">
<button onclick="addProduct()" class="bg-sky-400 text-black px-4 py-2 mt-2">Add</button>
</div>

<!-- WhatsApp -->
<a href="https://wa.me/8801963792670"
class="fixed bottom-5 right-5 bg-green-500 p-4 rounded-full text-2xl">
💬
</a>

<script>
const PASS = "Foysal12@#";
let storeData = {};

function openLogin(){
document.getElementById("loginBox").classList.remove("hidden");
}

function checkPass(){
if(document.getElementById("pass").value === PASS){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("adminPanel").classList.remove("hidden");
} else alert("Wrong Password");
}

// ADD PRODUCT (Firebase)
function addProduct(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let img = document.getElementById("img").value;

window.dbPush(window.dbRef(window.db,'products'),{name,price,img});
}

// LOAD PRODUCTS
setInterval(()=>{
const ref = window.dbRef(window.db,'products');
window.dbOnValue(ref,(snap)=>{
const data = snap.val();
storeData = data || {};
let html = "";

Object.keys(storeData).forEach(key=>{
let p = storeData[key];

html += `
<div class="card text-center">
<img src="${p.img}" class="rounded-xl mb-2">
<h3>${p.name}</h3>
<p class="text-sky-400 font-bold">৳${p.price}</p>
<a href="https://wa.me/8801963792670?text=I want ${p.name}" class="bg-white text-black px-3 py-1 rounded">Order</a>
</div>
`;
});

document.getElementById("products").innerHTML = html;
});
},1000);
</script>

</body>
</html>
