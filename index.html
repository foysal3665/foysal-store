<!DOCTYPE html>
<html>
<head>
  <title>Zenvy Store Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body{margin:0;font-family:Arial;background:#f2f2f2;}

    .top{
      background:#111;
      color:white;
      padding:15px;
      text-align:center;
      font-size:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:10px;
      padding:10px;
    }

    .card{
      background:white;
      padding:10px;
      border-radius:10px;
    }

    img{
      width:100%;
      height:150px;
      object-fit:cover;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:8px;
      margin-top:5px;
      border:none;
      cursor:pointer;
    }

    .order{background:green;color:white;}

    /* ADMIN PANEL */
    #admin{
      display:none;
      background:#111;
      color:white;
      padding:15px;
    }

    input{
      width:100%;
      padding:8px;
      margin:5px 0;
    }

    .add{background:green;color:white;}
    .logout{background:red;color:white;}
  </style>
</head>

<body>

<div class="top">🔥 Zenvy Store</div>

<!-- STORE -->
<div id="store">
  <div class="grid" id="products"></div>
</div>

<!-- ADMIN -->
<div id="admin">

  <h2>Admin Panel</h2>

  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <hr>

  <div id="panel" style="display:none;">

    <h3>Add Product</h3>

    <input id="name" placeholder="Name">
    <input id="price" placeholder="Price">
    <input id="img" placeholder="Image URL">

    <button class="add" onclick="addProduct()">Add Product</button>

    <h3>Orders</h3>
    <div id="orders"></div>

    <button class="logout" onclick="logout()">Logout</button>

  </div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* TOGGLE ADMIN */
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.key=="a"){
    document.getElementById("admin").style.display="block";
  }
});

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value)
  .then(()=>{
    panel.style.display="block";
    loadOrders();
  })
  .catch(e=>alert(e.message));
}

/* LOGOUT */
function logout(){
  auth.signOut();
  panel.style.display="none";
}

/* ADD PRODUCT */
function addProduct(){
  db.collection("products").add({
    name:name.value,
    price:price.value,
    img:img.value
  });

  alert("Added");
}

/* ORDER */
function order(p){
  db.collection("orders").add({
    product:p.name,
    price:p.price,
    status:"pending"
  });

  alert("Order placed!");
}

/* LOAD PRODUCTS */
db.collection("products").onSnapshot(snap=>{
  let html="";

  snap.forEach(doc=>{
    let p=doc.data();

    html+=`
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>৳${p.price}</p>
        <button class="order" onclick='order(${JSON.stringify(p)})'>
          Order
        </button>
      </div>
    `;
  });

  products.innerHTML=html;
});

/* ORDERS */
function loadOrders(){
  db.collection("orders").onSnapshot(snap=>{
    let html="";

    snap.forEach(doc=>{
      let o=doc.data();
      html+=`📦 ${o.product} - ৳${o.price}<br>`;
    });

    orders.innerHTML=html;
  });
}

</script>

</body>
</html>
