<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foysal Fashion | Luxury Global Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALuGjVy2_L-ufS785MzFPmde0Po2HTxD8",
            authDomain: "foysal-store.firebaseapp.com",
            projectId: "foysal-store",
            storageBucket: "foysal-store.firebasestorage.app",
            messagingSenderId: "509319347526",
            appId: "1:509319347526:web:7958b038fc9b2ad1953947",
            databaseURL: "https://foysal-store-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Making Firebase functions available globally
        window.dbRef = ref; window.dbPush = push; window.dbOnValue = onValue; window.dbRemove = remove; window.db = db;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Hind+Siliguri:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .hero-bg { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600'); background-size: cover; background-position: center; height: 400px; display: flex; align-items: center; justify-content: center; }
        .product-card { border-radius: 24px; transition: 0.4s ease; background: #fff; border: 1px solid #f1f5f9; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.15); }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900">

    <!-- Website View -->
    <div id="user-view">
        <nav class="glass-nav border-b sticky top-0 z-50 py-4 px-6 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-tighter uppercase text-slate-900">FOYSAL<span class="font-light italic text-slate-500"> FASHION</span></h1>
            <button onclick="openLoginModal()" class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-black hover:text-white transition shadow-sm">
                <i class="fas fa-user-shield"></i>
            </button>
        </nav>

        <header class="hero-bg text-white text-center px-6">
            <div class="max-w-2xl">
                <h1 class="text-4xl md:text-7xl font-bold mb-4">Elite Style</h1>
                <p class="text-slate-200 mb-8 opacity-80 uppercase tracking-widest text-xs">Global Luxury Experience</p>
                <a href="#shop" class="bg-white text-black px-10 py-4 rounded-full font-bold shadow-xl inline-block">Explore Shop</a>
            </div>
        </header>

        <main class="container mx-auto px-4 py-16" id="shop">
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <!-- Admin Dashboard View -->
    <div id="admin-dashboard-view" class="hidden min-h-screen bg-slate-100">
        <div class="bg-slate-900 text-white p-5 flex justify-between items-center">
            <h2 class="text-xl font-bold italic tracking-tighter text-indigo-400 uppercase">Foysal Inventory Pro</h2>
            <button onclick="exitDashboard()" class="bg-white/10 hover:bg-red-500 px-4 py-2 rounded-lg text-xs font-bold transition">Exit</button>
        </div>

        <div class="container mx-auto px-4 py-8 max-w-5xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Add Form -->
                <div class="bg-white p-6 rounded-[30px] shadow-xl space-y-4 h-fit border border-white">
                    <h3 class="font-bold text-slate-800 border-b pb-3 mb-4 italic uppercase text-sm">Add Product</h3>
                    <input type="text" id="p-name" placeholder="পণ্যের নাম" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100">
                    <input type="number" id="p-price" placeholder="দাম (৳)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 font-bold">
                    <input type="file" id="p-image-file" accept="image/*" class="w-full p-3 bg-slate-50 rounded-xl text-xs border border-dashed border-indigo-200">
                    <button id="save-btn" onclick="saveToCloud()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-indigo-600 transition uppercase tracking-widest text-xs">Publish Globally</button>
                </div>
                <!-- List -->
                <div class="md:col-span-2 bg-white p-6 rounded-[30px] shadow-xl border border-white min-h-[400px]">
                    <h3 class="font-bold text-slate-800 border-b pb-3 mb-4 italic uppercase text-sm">Inventory Management</h3>
                    <div id="admin-product-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="admin-login-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-xl hidden z-[300] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl text-center">
            <h2 class="text-2xl font-bold mb-8 italic text-slate-800 uppercase tracking-tighter">Security Access</h2>
            <input type="password" id="admin-pass-input" placeholder="PASSWORD" class="w-full p-5 bg-slate-50 border-none rounded-2xl mb-6 outline-none text-center font-bold tracking-[0.4em] focus:ring-2 ring-indigo-500 shadow-inner">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg uppercase tracking-widest transition active:scale-95">Verify</button>
            <button onclick="document.getElementById('admin-login-modal').classList.add('hidden')" class="mt-6 text-slate-400 font-bold text-xs uppercase">Cancel</button>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="order-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden z-[110] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[30px] p-8 shadow-2xl">
            <button onclick="closeModal()" class="float-right text-2xl text-slate-400">&times;</button>
            <div id="order-info" class="mb-6 p-4 bg-slate-50 rounded-2xl flex gap-4 items-center border"></div>
            <div class="space-y-4">
                <input type="text" id="c-name" placeholder="আপনার নাম" class="w-full p-4 bg-slate-50 rounded-2xl outline-none shadow-inner border border-slate-100">
                <input type="text" id="c-addr" placeholder="ঠিকানা" class="w-full p-4 bg-slate-50 rounded-2xl outline-none shadow-inner border border-slate-100">
                <input type="number" id="c-phone" placeholder="মোবাইল নাম্বার" class="w-full p-4 bg-slate-50 rounded-2xl outline-none shadow-inner border border-slate-100">
                <button onclick="confirmWhatsApp()" class="w-full bg-[#25D366] text-white py-5 rounded-[22px] font-extrabold flex items-center justify-center gap-3 text-lg shadow-xl active:scale-95">
                    <i class="fab fa-whatsapp text-2xl"></i> CONFIRM ORDER
                </button>
            </div>
        </div>
    </div>

    <!-- WhatsApp Support -->
    <a href="https://wa.me/8801963792670" class="fixed bottom-6 left-6 bg-[#25D366] w-14 h-14 rounded-full flex items-center justify-center text-white text-3xl shadow-2xl z-50 hover:scale-110 transition active:scale-95">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        const MASTER_PASS = "Foysal12@#";
        const WHATSAPP = "8801963792670";
        let storeData = {};
        let selectedP = null;

        // LOGIN SYSTEM
        window.openLoginModal = () => { document.getElementById('admin-login-modal').classList.remove('hidden'); }
        window.handleLogin = () => {
            const input = document.getElementById('admin-pass-input').value;
            if(input === MASTER_PASS) {
                document.getElementById('admin-login-modal').classList.add('hidden');
                document.getElementById('user-view').classList.add('hidden');
                document.getElementById('admin-dashboard-view').classList.remove('hidden');
            } else {
                alert("ACCESS DENIED: WRONG PASSWORD");
            }
        }
        window.exitDashboard = () => {
            document.getElementById('admin-dashboard-view').classList.add('hidden');
            document.getElementById('user-view').classList.remove('hidden');
        }

        // DATABASE LOAD
        setInterval(() => {
            if(!window.dbOnValue) return;
            const ref = window.dbRef(window.db, 'global_products');
            window.dbOnValue(ref, (snap) => {
                const data = snap.val();
                storeData = data || {};
                const grid = document.getElementById('product-grid');
                const adminList = document.getElementById('admin-product-list');
                
                grid.innerHTML = "";
                adminList.innerHTML = "";

                Object.keys(storeData).forEach(key => {
                    const p = storeData[key];
                    grid.innerHTML += `
                        <div onclick="openOrder('${key}')" class="product-card p-3 cursor-pointer group">
                            <div class="relative overflow-hidden aspect-[4/5] rounded-[18px] mb-4">
                                <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1 tracking-widest">${p.name}</p>
                                <p class="text-indigo-600 font-extrabold text-xl italic tracking-tighter">৳${p.price}</p>
                            </div>
                        </div>
                    `;
                    adminList.innerHTML += `
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-white shadow-sm">
                            <div class="flex items-center gap-4">
                                <img src="${p.img}" class="w-12 h-12 rounded-xl object-cover border-2 border-white">
                                <p class="text-xs font-bold text-slate-800 uppercase">${p.name}</p>
                            </div>
                            <button onclick="removeProduct('${key}')" class="text-red-500 h-10 w-10 bg-white rounded-xl shadow-sm"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                });
            }, { onlyOnce: true });
        }, 1000);

        // ADMIN ACTIONS
        window.saveToCloud = () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const file = document.getElementById('p-image-file').files[0];
            const btn = document.getElementById('save-btn');

            if(!name || !price || !file) { alert("সব তথ্য দিন!"); return; }
            btn.innerText = "Syncing...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                window.dbPush(window.dbRef(window.db, 'global_products'), { name, price, img: reader.result });
                alert("পণ্যটি সফলভাবে যোগ হয়েছে!");
                document.getElementById('p-name').value = "";
                document.getElementById('p-price').value = "";
                btn.innerText = "Publish Globally";
            }
        }

        window.removeProduct = (key) => {
            if(confirm("Deleteglobally?")) { window.dbRemove(window.dbRef(window.db, 'global_products/' + key)); }
        }

        // ORDER SYSTEM
        window.openOrder = (key) => {
            selectedP = storeData[key];
            document.getElementById('order-info').innerHTML = `
                <img src="${selectedP.img}" class="w-16 h-16 rounded-xl object-cover shadow-md border-2 border-white">
                <div class="text-left"><h4 class="font-bold text-slate-800 text-sm mb-1">${selectedP.name}</h4><p class="text-indigo-600 font-extrabold">৳${selectedP.price}</p></div>
            `;
            document.getElementById('order-modal').classList.remove('hidden');
        }
        window.closeModal = () => { document.getElementById('order-modal').classList.add('hidden'); }
        window.confirmWhatsApp = () => {
            const n = document.getElementById('c-name').value, a = document.getElementById('c-addr').value, ph = document.getElementById('c-phone').value;
            if(!n || !a || !ph) { alert("Please fill all info!"); return; }
            const msg = `আসসালামু আলাইকুম!\nপণ্য: ${selectedP.name}\nমূল্য: ৳${selectedP.price}\n\n-- কাস্টমার তথ্য --\nনাম: ${n}\nঠিকানা: ${a}\nমোবাইল: ${ph}`;
            window.location.href = `https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
