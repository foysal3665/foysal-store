<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE STORE | Elite Shopping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Hind+Siliguri:wght@400;700&display=swap');
        
        :root { --main-bg: #0f172a; --accent: #6366f1; }
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .hero-gradient { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .product-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2rem; }
        .product-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .btn-premium { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); transition: 0.3s; }
        .btn-premium:active { scale: 0.95; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Floating Animation */
        @keyframes pulse-custom { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-slow { animation: pulse-custom 3s infinite; }
    </style>
</head>
<body class="text-slate-900">

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-[100] py-5 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-tighter text-slate-900 uppercase">
                <span class="text-indigo-600">LUXE</span> STORE
            </h1>
            <div class="flex items-center gap-5">
                <button onclick="openAdmin()" class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 hover:text-indigo-600 transition shadow-inner">
                    <i class="fa-solid fa-sliders text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero-gradient text-white py-24 px-8 relative overflow-hidden min-h-[500px] flex items-center">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-500/20 rounded-full blur-[120px] -mr-40 -mt-40 animate-pulse-slow"></div>
        
        <div class="container mx-auto relative z-10 text-center lg:text-left">
            <div class="max-w-3xl">
                <span class="inline-block px-5 py-2 rounded-full bg-white/5 border border-white/10 text-indigo-400 text-xs font-bold mb-8 tracking-[0.3em] uppercase">Autumn 2024 Collection</span>
                <h1 class="text-5xl md:text-8xl font-extrabold leading-[1.1] mb-8 tracking-tight">
                    অভিজাতদের জন্য <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 italic">সেরা পছন্দ</span>
                </h1>
                <p class="text-slate-400 mb-12 text-lg md:text-2xl max-w-xl leading-relaxed">
                    সেরা মানের ডিজাইন এবং প্রিমিয়াম ফিনিশিংয়ের পণ্য এখন সরাসরি আপনার হাতের মুঠোয়।
                </p>
                <div class="flex flex-wrap justify-center lg:justify-start gap-5">
                    <a href="#shop" class="btn-premium px-12 py-5 rounded-[2rem] font-bold text-lg shadow-2xl shadow-indigo-500/40">Shop Now</a>
                    <a href="https://wa.me/8801963792670" class="px-12 py-5 rounded-[2rem] bg-white/5 backdrop-blur-md border border-white/20 font-bold text-lg hover:bg-white/10 transition">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-5 py-24" id="shop">
        <div class="flex items-end justify-between mb-16 border-b border-slate-100 pb-8">
            <div>
                <p class="text-indigo-600 font-bold text-xs uppercase tracking-widest mb-2">Curated List</p>
                <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight italic">Trending Items</h2>
            </div>
            <div class="hidden md:block text-slate-300 font-bold text-6xl">01</div>
        </div>

        <!-- 2-Column Luxury Grid -->
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-12">
            <!-- Products Loaded Dynamically -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-100 py-20 text-center">
        <div class="container mx-auto px-6">
            <h2 class="text-4xl font-black mb-8 text-slate-900 tracking-tighter uppercase italic">LUXE STORE</h2>
            <div class="flex justify-center gap-10 mb-12">
                <a href="#" class="text-slate-400 hover:text-indigo-600 transition text-2xl"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="text-slate-400 hover:text-indigo-600 transition text-2xl"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="text-slate-400 hover:text-indigo-600 transition text-2xl"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
            <p class="text-slate-400 text-sm font-bold tracking-[0.2em] uppercase">© 2024 Luxury Group International</p>
        </div>
    </footer>

    <!-- Full-Screen Luxury Order Modal -->
    <div id="order-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl hidden z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4 transition-all">
        <div class="bg-white w-full max-w-lg rounded-t-[3rem] sm:rounded-[2.5rem] p-10 shadow-2xl overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic tracking-tighter text-slate-900">CHECKOUT</h2>
                <button onclick="closeModal()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-100 text-slate-500 text-2xl hover:bg-red-50 hover:text-red-500 transition">&times;</button>
            </div>
            
            <div id="selected-info" class="mb-10 p-6 bg-slate-50 rounded-[2rem] flex gap-6 items-center border border-slate-100 shadow-inner">
                <!-- Product Preview -->
            </div>

            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Customer Name</label>
                    <input type="text" id="cust-name" placeholder="আপনার পুরো নাম" class="w-full p-5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition shadow-inner font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Delivery Address</label>
                    <input type="text" id="cust-addr" placeholder="বাসা/এলাকা, থানা, জেলা" class="w-full p-5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition shadow-inner font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">WhatsApp Number</label>
                    <input type="number" id="cust-phone" placeholder="01XXXXXXXXX" class="w-full p-5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 ring-indigo-500 transition shadow-inner font-bold tracking-widest">
                </div>
                
                <div class="pt-4">
                    <p class="font-black text-[10px] text-slate-400 mb-4 ml-2 uppercase tracking-widest">Payment Method</p>
                    <div class="grid grid-cols-1 gap-3">
                        <label class="flex justify-between p-5 bg-slate-50 rounded-2xl cursor-pointer border-2 border-transparent has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50 transition shadow-sm">
                            <span class="font-bold text-slate-800">Mobile Banking (Bkash/Nagad)</span>
                            <input type="radio" name="pay" value="Mobile Banking" checked class="accent-indigo-600">
                        </label>
                        <label class="flex justify-between p-5 bg-slate-50 rounded-2xl cursor-pointer border-2 border-transparent has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50 transition shadow-sm">
                            <span class="font-bold text-slate-800">Cash on Delivery</span>
                            <input type="radio" name="pay" value="Cash on Delivery" class="accent-indigo-600">
                        </label>
                    </div>
                </div>

                <button onclick="sendOrder()" class="w-full btn-premium text-white py-6 rounded-[2rem] font-black flex items-center justify-center gap-4 text-xl shadow-2xl shadow-indigo-500/40 active:scale-95 transition-all mt-8 uppercase tracking-tighter">
                    <i class="fa-brands fa-whatsapp text-3xl"></i> Confirm Order
                </button>
            </div>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="admin-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-2xl hidden z-[300] flex items-center justify-center p-4 transition-all">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <!-- Login -->
            <div id="admin-login-ui">
                <div class="w-24 h-24 bg-indigo-50 text-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto mb-8 text-4xl shadow-inner"><i class="fa-solid fa-fingerprint"></i></div>
                <h2 class="text-3xl font-black mb-10 text-center italic tracking-tighter text-slate-900">SECURITY VERIFICATION</h2>
                <input type="password" id="admin-pass" placeholder="PASSWORD" class="w-full p-6 bg-slate-50 border-none rounded-2xl mb-6
